<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>eek-a-sketch</title>
  <style>
    :root {
      --panel-w: 172px;
      --bg: #e5e7eb;
      --panel: rgba(255,255,255,.96);
      --border: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --active: #111111;
      --danger: #dc2626;
      --radius: 12px;
      --shadow: 0 12px 24px rgba(0,0,0,.12);
      --min-btn-h: 34px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    #viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background: var(--bg);
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: crosshair;
    }

    #sidebar {
      position: absolute;
      left: 8px;
      top: 8px;
      width: var(--panel-w);
      max-height: calc(100vh - 16px);
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      z-index: 20;
      overflow: hidden;
    }

    #sidePanel {
      position: absolute;
      left: calc(8px + var(--panel-w) + 12px);
      top: 8px;
      width: min(320px, calc(100vw - var(--panel-w) - 40px));
      max-height: calc(100vh - 16px);
      display: none;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      z-index: 22;
      overflow: hidden;
    }
    #sidePanel.show { display: flex; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .panel-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px 12px;
      overflow: auto;
    }
    .panel-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .panel-toolbar .btn {
      min-height: 28px;
      padding: 5px 8px;
      font-size: 10px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .list-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 11px;
    }
    .list-row.selected {
      border-color: var(--active);
      box-shadow: 0 0 0 1px var(--active) inset;
    }
    .row-main {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .row-main-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .row-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-subtitle {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-btn {
      min-height: 24px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 10px;
      padding: 4px 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .mini-btn:hover { background: #f8fafc; }
    .mini-btn.active {
      background: var(--active);
      border-color: var(--active);
      color: #fff;
    }

    .fold-btn {
      width: 18px;
      min-width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #fff;
      font-size: 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .log-children {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-left: 18px;
      padding-left: 8px;
      border-left: 1px solid var(--border);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      flex: 0 0 auto;
    }
    .pill.neutral {
      background: #f8fafc;
      color: #475569;
      border-color: var(--border);
    }
    .muted-note {
      font-size: 10px;
      color: var(--muted);
    }

    .popup-menu {
      position: absolute;
      z-index: 35;
      display: none;
      min-width: 178px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.98);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .popup-menu.show { display: block; }
    .popup-title {
      margin-bottom: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      flex: 0 0 auto;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 0 0 auto;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .grid-2, .grid-3, .grid-4, .grid-5 {
      display: grid;
      gap: 4px;
    }
    .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-5 { grid-template-columns: repeat(5, minmax(0,1fr)); }

    .btn, .tool-btn {
      min-height: var(--min-btn-h);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      padding: 6px 8px;
      line-height: 1.2;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .btn:hover, .tool-btn:hover { background: #f8fafc; }
    .tool-btn.active, .btn.active {
      background: var(--active);
      border-color: var(--active);
      color: #fff;
    }
    .btn.danger {
      background: var(--danger);
      border-color: #f87171;
      color: #fff;
    }
    .btn:disabled, .tool-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }

    .stepper,
    .stepper-single {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .stepper input[type="number"],
    .stepper-single input[type="number"] {
      min-width: 0;
      flex: 1 1 auto;
      border: 0;
      padding: 6px 4px;
      font-size: 11px;
      outline: none;
      background: transparent;
    }
    .stepper-side {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .stepper-side button {
      width: 18px;
      height: 16px;
      border: 0;
      background: #fff;
      font-size: 9px;
      cursor: pointer;
    }
    .stepper-side button + button { border-top: 1px solid var(--border); }
    .stepper-single button {
      width: 24px;
      border: 0;
      border-left: 1px solid var(--border);
      background: #fff;
      font-size: 10px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    input[type="range"] { width: 100%; }
    .slider-value {
      width: 30px;
      text-align: right;
      font-size: 10px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .swatch {
      width: 100%;
      height: 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
    }
    .swatch.active {
      border-color: #111;
      box-shadow: 0 0 0 2px #111 inset;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 6px;
    }
    .checkbox-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 11px;
    }
    .checkbox-chip .target-preview {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      border: 1px solid rgba(15,23,42,.2);
      flex: 0 0 auto;
    }

    #textEditor {
      position: absolute;
      z-index: 30;
      min-width: 120px;
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid #111;
      border-radius: 8px;
      background: rgba(255,255,255,.96);
      outline: none;
      resize: both;
      font-family: sans-serif;
      display: none;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.25;
    }

    #confirmOverlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.4);
      padding: 16px;
    }
    #confirmOverlay.show { display: flex; }
    .dialog {
      width: min(360px, 100%);
      background: white;
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,.24);
      padding: 16px;
    }
    .dialog-title { font-weight: 700; }
    .dialog-text { margin-top: 8px; font-size: 14px; color: #475569; }
    .dialog-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    @media (max-width: 720px) {
      #sidePanel {
        left: 8px;
        right: 8px;
        top: auto;
        bottom: 8px;
        width: auto;
        max-height: 45vh;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <input id="fileInput" type="file" accept="image/*" hidden />
    <div id="viewport">
      <canvas id="canvas"></canvas>
      <div id="textEditor" contenteditable="true" spellcheck="false" role="textbox" aria-multiline="true"></div>

      <div id="sidebar">
        <div class="section">
          <div class="grid-4">
            <button id="undoBtn" class="btn">Undo</button>
            <button id="redoBtn" class="btn">Redo</button>
            <button id="elementsBtn" class="btn">Elements</button>
            <button id="logBtn" class="btn">Log</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section">
          <div class="section-title">TOOLS</div>
          <div id="toolsGrid" class="grid-2"></div>
        </div>

        <div id="toolAttributesDivider" class="divider"></div>

        <div id="toolAttributesSection" class="section" style="display:none">
          <div class="section-title">TOOL ATTRIBUTES</div>

          <div id="shapeField" class="field">
            <div class="field-label">Shape</div>
            <div id="shapeGrid" class="grid-2"></div>
          </div>

          <div id="textStyleField" class="field" style="display:none">
            <div class="field-label">Typeface</div>
            <div id="textStyleGrid" class="grid-3"></div>
          </div>

          <div id="textAlignField" class="field" style="display:none">
            <div class="field-label">Align</div>
            <div id="textAlignGrid" class="grid-3"></div>
          </div>

          <div id="textBoxField" class="field" style="display:none">
            <div class="field-label">Box</div>
            <div id="textBoxGrid" class="grid-2"></div>
          </div>

          <div id="strokeField" class="field">
            <div class="field-label">Stroke</div>
            <div class="stepper">
              <input id="strokeInput" type="number" min="0" max="60" />
              <div class="stepper-side">
                <button id="strokeUp" type="button">▲</button>
                <button id="strokeDown" type="button">▼</button>
              </div>
            </div>
          </div>

          <div id="shapeTargetField" class="field" style="display:none">
            <div class="field-label">Colour target</div>
            <div class="checkbox-grid">
              <label class="checkbox-chip">
                <input id="fillTargetInput" type="checkbox" />
                <span class="target-preview" id="fillPreview"></span>
                <span>Fill</span>
              </label>
              <label class="checkbox-chip">
                <input id="strokeTargetInput" type="checkbox" />
                <span class="target-preview" id="strokePreview"></span>
                <span>Stroke</span>
              </label>
            </div>
          </div>

          <div id="lineArrowField" class="field" style="display:none">
            <div class="field-label">Arrowheads</div>
            <div class="checkbox-grid">
              <label class="checkbox-chip">
                <input id="lineStartHeadToolInput" type="checkbox" />
                <span>Start</span>
              </label>
              <label class="checkbox-chip">
                <input id="lineEndHeadToolInput" type="checkbox" />
                <span>End</span>
              </label>
            </div>
          </div>

          <div id="backgroundRgbField" class="grid-3" style="display:none">
            <label class="field">
              <div class="field-label">R</div>
              <div class="stepper">
                <input id="bgR" type="number" min="0" max="255" />
                <div class="stepper-side">
                  <button id="bgRUp" type="button">▲</button>
                  <button id="bgRDown" type="button">▼</button>
                </div>
              </div>
            </label>
            <label class="field">
              <div class="field-label">G</div>
              <div class="stepper">
                <input id="bgG" type="number" min="0" max="255" />
                <div class="stepper-side">
                  <button id="bgGUp" type="button">▲</button>
                  <button id="bgGDown" type="button">▼</button>
                </div>
              </div>
            </label>
            <label class="field">
              <div class="field-label">B</div>
              <div class="stepper">
                <input id="bgB" type="number" min="0" max="255" />
                <div class="stepper-side">
                  <button id="bgBUp" type="button">▲</button>
                  <button id="bgBDown" type="button">▼</button>
                </div>
              </div>
            </label>
          </div>
        </div>

        <div class="divider"></div>

        <div id="attributesSection" class="section">
          <div class="section-title">GENERAL ATTRIBUTES</div>

          <div id="sizeField" class="field">
            <div class="field-label">Size</div>
            <div class="stepper">
              <input id="sizeInput" type="number" min="1" max="300" />
              <div class="stepper-side">
                <button id="sizeUp" type="button">▲</button>
                <button id="sizeDown" type="button">▼</button>
              </div>
            </div>
          </div>

          <div id="alphaField" class="field">
            <div class="field-label">Alpha</div>
            <div class="slider-row">
              <input id="alphaInput" type="range" min="0" max="100" step="1" />
              <span id="alphaValue" class="slider-value">100</span>
            </div>
          </div>

          <div id="colourField" class="field">
            <div class="field-label">Colour</div>
            <div id="colourGrid" class="grid-5"></div>
          </div>
        </div>

        <div style="margin-top:auto"></div>
        <div class="divider"></div>

        <div class="section">
          <div class="section-title">ACTIONS</div>
          <div class="grid-2">
            <button id="uploadBtn" class="btn">Upload</button>
            <button id="pasteBtn" class="btn">Paste</button>
          </div>
          <div class="grid-3">
            <button id="saveBtn" class="btn">Save</button>
            <button id="copyBtn" class="btn">Copy</button>
            <button id="clearBtn" class="btn danger">Clear</button>
          </div>
        </div>
      </div>

      <div id="sidePanel">
        <div class="panel-header">
          <div id="sidePanelTitle" class="panel-title">Panel</div>
          <button id="closePanelBtn" class="mini-btn" type="button">Close</button>
        </div>
        <div id="sidePanelBody" class="panel-body"></div>
      </div>

    </div>

    <div id="confirmOverlay">
      <div class="dialog">
        <div class="dialog-title">Are you sure?</div>
        <div class="dialog-text">This will remove everything currently on the canvas.</div>
        <div class="dialog-actions">
          <button id="cancelClearBtn" class="btn">Cancel</button>
          <button id="confirmClearBtn" class="btn danger">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOOL = {
      BRUSH: "brush",
      ERASER: "eraser",
      LINE: "line",
      SHAPE: "shape",
      CUT: "cut",
      ARROW_ONE: "arrowOne",
      ARROW_TWO: "arrowTwo",
      TEXT: "text",
      BACKGROUND: "background",
      SELECT: "select",
      MULTI_SELECT: "multiSelect",
      GROUP: "group",
    };

    const TOOL_ORDER = [
      TOOL.SELECT,
      TOOL.MULTI_SELECT,
      TOOL.GROUP,
      TOOL.BRUSH,
      TOOL.ERASER,
      TOOL.LINE,
      TOOL.SHAPE,
      TOOL.CUT,
      TOOL.TEXT,
      TOOL.BACKGROUND,
    ];

    const TOOL_LABEL = {
      [TOOL.SELECT]: "Select",
      [TOOL.MULTI_SELECT]: "Multi-select",
      [TOOL.GROUP]: "Group",
      [TOOL.BRUSH]: "Brush",
      [TOOL.ERASER]: "Eraser",
      [TOOL.LINE]: "Line",
      [TOOL.SHAPE]: "Shape",
      [TOOL.CUT]: "Cut",
      [TOOL.ARROW_ONE]: "Arrow one-way",
      [TOOL.ARROW_TWO]: "Arrow two-way",
      [TOOL.TEXT]: "Text",
      [TOOL.BACKGROUND]: "Background",
    };

    const SHAPES = ["circle", "square", "rectangle", "triangle", "hexagon"];
    const COLOUR_SWATCHES = [
      "#000000", "#404040", "#808080", "#bfbfbf", "#ffffff",
      "#7f1d1d", "#b91c1c", "#ef4444", "#f87171", "#fecaca",
      "#7c2d12", "#c2410c", "#f97316", "#fb923c", "#fed7aa",
      "#78350f", "#d97706", "#f59e0b", "#fbbf24", "#fde68a",
      "#365314", "#65a30d", "#84cc16", "#a3e635", "#d9f99d",
      "#14532d", "#16a34a", "#22c55e", "#4ade80", "#bbf7d0",
      "#1e3a8a", "#2563eb", "#3b82f6", "#60a5fa", "#bfdbfe",
    ];

    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function clone(value) { return JSON.parse(JSON.stringify(value)); }
    function makeId(prefix = "item") { return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`; }
    function distance(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
    function rectFromPoints(a, b) { return { x: Math.min(a.x, b.x), y: Math.min(a.y, b.y), w: Math.abs(b.x - a.x), h: Math.abs(b.y - a.y) }; }
    function canvasPointFromEvent(event, canvas) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }
    function pointInRect(point, rect) {
      return point.x >= rect.x && point.x <= rect.x + rect.w && point.y >= rect.y && point.y <= rect.y + rect.h;
    }
    function midpoint(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }
    function getAlpha01(alpha) { return clamp(alpha ?? 100, 0, 100) / 100; }
    function rgbToHex(r, g, b) {
      const toHex = (v) => clamp(Number(v) || 0, 0, 255).toString(16).padStart(2, "0");
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }
    function uniqueIds(ids) { return [...new Set(ids.filter(Boolean))]; }
    function unionRect(a, b) {
      if (!a) return b;
      if (!b) return a;
      const x = Math.min(a.x, b.x);
      const y = Math.min(a.y, b.y);
      const right = Math.max(a.x + a.w, b.x + b.w);
      const bottom = Math.max(a.y + a.h, b.y + b.h);
      return { x, y, w: right - x, h: bottom - y };
    }
    function commonValue(values) {
      const filtered = values.filter((value) => value !== undefined && value !== null);
      if (!filtered.length) return undefined;
      return filtered.every((value) => value === filtered[0]) ? filtered[0] : undefined;
    }
    function titleCase(text) { return text.charAt(0).toUpperCase() + text.slice(1); }

    function getTextPaddingForSize(size) {
      return Math.max(6, Math.round((size || 16) * 0.35));
    }

    function normalizeFontStyle(style) {

        if (typeof patch.size === "number") next.size = patch.size;
        if (patch.shape && next.type === "eraser") next.shape = patch.shape;
        if (patch.color && next.type === "brush") next.color = patch.color;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
        if (typeof patch.startHead === "boolean" && next.type === "brush") next.startHead = patch.startHead;
        if (typeof patch.endHead === "boolean" && next.type === "brush") next.endHead = patch.endHead;
        if (next.type === "brush") next.shape = "circle";
      } else if (next.type === "line" || next.type === "arrow") {
        if (typeof patch.size === "number") next.size = patch.size;
        if (patch.color) next.color = patch.color;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
        if (typeof patch.startHead === "boolean") next.startHead = patch.startHead;
        if (typeof patch.endHead === "boolean") next.endHead = patch.endHead;
      } else if (next.type === "shape") {
        if (typeof patch.size === "number") {
          const cx = next.x + next.w / 2;
          const cy = next.y + next.h / 2;
          next.w = patch.size;
          next.h = patch.size;
          next.x = cx - next.w / 2;
          next.y = cy - next.h / 2;
        }
        if (patch.shape) {
          next.shape = patch.shape;
          const adjusted = enforceShapeGeometry(next);
          next.w = adjusted.w;
          next.h = adjusted.h;
        }
        if (patch.fillColor) next.fillColor = patch.fillColor;
        if (patch.strokeColor) next.strokeColor = patch.strokeColor;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
        if (typeof patch.stroke === "number") next.stroke = patch.stroke;
      } else if (next.type === "text") {
        if (typeof patch.size === "number") next.size = patch.size;
        if (patch.color) next.color = patch.color;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
        if (patch.fontStyle) {
          next.fontStyle = normalizeFontStyle(patch.fontStyle);
          next.textRuns = normalizeTextRuns(next.text, [{ text: next.text, fontStyle: next.fontStyle }], next.fontStyle);
        }
        if (patch.align) next.align = patch.align;
        if (typeof patch.boxed === "boolean") next.boxed = patch.boxed;
        if (patch.boxFillColor) next.boxFillColor = patch.boxFillColor;
        if (patch.boxStrokeColor) next.boxStrokeColor = patch.boxStrokeColor;
        if (typeof patch.stroke === "number") next.boxStroke = patch.stroke;
        if (typeof patch.boxStroke === "number") next.boxStroke = patch.boxStroke;
        if (typeof patch.width === "number") next.width = patch.width;
        if (typeof patch.height === "number") next.height = patch.height;
        next = ensureTextBoxFitsContent(next);
      } else if (next.type === "image") {
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
      }
      return next;
    }

    function getTwoTouchDistance(touchMap) {
      const values = Array.from(touchMap.values());
      if (values.length < 2) return 0;
      return distance(values[0], values[1]);
    }

    function getBaseElementLabel(object) {
      if (object.type === "brush") return "Brush";
      if (object.type === "eraser") return "Eraser";
      if (object.type === "line") return "Line";
      if (object.type === "arrow") return "Arrow";
      if (object.type === "shape") return "Shape";
      if (object.type === "text") return "Text";
      if (object.type === "image") return "Image";
      return titleCase(object.type);
    }

    function getElementMetaList(scene) {
      const counts = {};
      return scene.objects.map((object, index) => {
        const base = getBaseElementLabel(object);
        counts[base] = (counts[base] || 0) + 1;
        return {
          object,
          timeIndex: index,
          label: `${base}${counts[base]}`,
          baseLabel: base,
        };
      });
    }

    function describeElement(object) {
      if (object.type === "shape") return `${object.shape}, ${Math.round(object.w)}×${Math.round(object.h)}`;
      if (object.type === "line" || object.type === "arrow") return `${Math.round(distance(object.start, object.end))} px`;
      if (object.type === "brush" || object.type === "eraser") return `${object.points?.length || 0} points`;
      if (object.type === "text") return (object.text || "").split("\n")[0] || "empty";
      if (object.type === "image") return `${Math.round(object.width)}×${Math.round(object.height)}`;
      return "";
    }

    const state = {
      scene: { backgroundColor: "#ffffff", objects: [] },
      history: [],
      historyIndex: 0,
      historyActions: [],
      activeTool: TOOL.BRUSH,
      selectMode: false,
      multiSelectMode: false,
      selectedIds: [],
      interaction: null,
      draft: null,
      editingText: null,
      view: { scale: 1, offsetX: 0, offsetY: 0 },
      canvasSize: { width: 1200, height: 700 },
      touchMap: new Map(),
      pinchState: null,
      elementClipboard: null,
      lastClipboardSource: null,
      clipboardPasteCount: 0,
      logGroupOpen: {},
      panels: { open: null, elementSort: "time" },
      shapeColourTargets: { fill: true, stroke: false },
      sharedColour: "#000000",
      lineMenu: { visible: false, targetId: null, x: 0, y: 0 },
      toolPrefs: {
        [TOOL.BRUSH]: { color: "#000000", size: 10, alpha: 100, startHead: false, endHead: false },
        [TOOL.ERASER]: { size: 18, shape: "circle", alpha: 100 },
        [TOOL.LINE]: { color: "#000000", size: 4, alpha: 100, startHead: false, endHead: false },
        [TOOL.SHAPE]: { fillColor: "#000000", strokeColor: "#000000", size: 90, shape: "rectangle", stroke: 3, alpha: 100 },
        [TOOL.CUT]: {},
        [TOOL.ARROW_ONE]: { color: "#000000", size: 4, alpha: 100, startHead: false, endHead: true },
        [TOOL.ARROW_TWO]: { color: "#000000", size: 4, alpha: 100, startHead: true, endHead: true },
        [TOOL.TEXT]: {
          color: "#000000", size: 28, alpha: 100,
          fontStyle: "regular", align: "left", boxed: false,
          boxFillColor: "#ffffff", boxStrokeColor: "#000000", boxStroke: 2,
          width: 180, height: 70
        },
        [TOOL.BACKGROUND]: { color: "#ffffff" },
        image: { scalePercent: 100, alpha: 100 },
      },
      imageCache: {},
    };

    const $ = (id) => document.getElementById(id);
    const canvas = $("canvas");
    const viewport = $("viewport");
    const fileInput = $("fileInput");
    const textEditor = $("textEditor");
    const confirmOverlay = $("confirmOverlay");
    const sidePanel = $("sidePanel");
    const sidePanelTitle = $("sidePanelTitle");
    const sidePanelBody = $("sidePanelBody");
    const ctx = canvas.getContext("2d");

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getTextRunsSignature(text, textRuns, fontStyle = "regular") {
      return JSON.stringify(normalizeTextRuns(text, textRuns, fontStyle));
    }

    function renderTextRunsHtml(runs) {
      return runs.map((run) => {
        const style = run.fontStyle === "italic"
          ? "font-style:italic;font-weight:400;"
          : run.fontStyle === "bold"
            ? "font-style:normal;font-weight:700;"
            : "font-style:normal;font-weight:400;";
        return `<span data-font-style="${run.fontStyle}" style="${style}">${escapeHtml(run.text)}</span>`;
      }).join("");
    }

    function parseTextRunsFromDom(root, fallbackStyle = "regular") {
      const runs = [];
      const visit = (node, activeStyle) => {
        if (node.nodeType === Node.TEXT_NODE) {
          appendTextRun(runs, node.nodeValue || "", activeStyle);
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        const tag = node.tagName.toLowerCase();
        if (tag === "br") {
          appendTextRun(runs, "\n", activeStyle);
          return;
        }
        let nextStyle = activeStyle;
        const dataStyle = node.getAttribute("data-font-style");
        if (dataStyle) nextStyle = normalizeFontStyle(dataStyle);
        else if (tag === "b" || tag === "strong") nextStyle = "bold";
        else if (tag === "i" || tag === "em") nextStyle = "italic";
        else if (node.style.fontStyle === "italic") nextStyle = "italic";
        else if (node.style.fontWeight === "bold" || Number(node.style.fontWeight) >= 600) nextStyle = "bold";

        node.childNodes.forEach((child) => visit(child, nextStyle));
        if ((tag === "div" || tag === "p") && node.nextSibling) appendTextRun(runs, "\n", activeStyle);
      };
      root.childNodes.forEach((child) => visit(child, fallbackStyle));
      return runs;
    }

    function getTextEditorSelectionOffsets() {
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) return null;
      const range = selection.getRangeAt(0);
      if (!textEditor.contains(range.startContainer) || !textEditor.contains(range.endContainer)) return null;

      const startRange = range.cloneRange();
      startRange.selectNodeContents(textEditor);
      startRange.setEnd(range.startContainer, range.startOffset);

      const endRange = range.cloneRange();
      endRange.selectNodeContents(textEditor);
      endRange.setEnd(range.endContainer, range.endOffset);

      return { start: startRange.toString().length, end: endRange.toString().length };
    }

    function findTextEditorPosition(offset) {
      const walker = document.createTreeWalker(textEditor, NodeFilter.SHOW_TEXT);
      let remaining = Math.max(0, offset);
      let lastNode = null;
      while (walker.nextNode()) {
        const node = walker.currentNode;
        const length = node.nodeValue?.length || 0;
        lastNode = node;
        if (remaining <= length) return { node, offset: remaining };
        remaining -= length;
      }
      if (lastNode) return { node: lastNode, offset: lastNode.nodeValue.length };
      return { node: textEditor, offset: textEditor.childNodes.length };
    }

    function restoreTextEditorSelection(start, end = start) {
      const selection = window.getSelection();
      if (!selection) return;
      const range = document.createRange();
      const startPos = findTextEditorPosition(start);
      const endPos = findTextEditorPosition(end);
      range.setStart(startPos.node, startPos.offset);
      range.setEnd(endPos.node, endPos.offset);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function syncEditingTextFromEditorDom() {
      if (!state.editingText) return;
      const runs = parseTextRunsFromDom(textEditor, state.editingText.fontStyle);
      state.editingText.textRuns = runs;
      state.editingText.text = runs.map((run) => run.text).join("");
      const unifiedStyle = commonValue(runs.map((run) => run.fontStyle));
      if (unifiedStyle) state.editingText.fontStyle = unifiedStyle;
      textEditor.dataset.signature = getTextRunsSignature(state.editingText.text, state.editingText.textRuns, state.editingText.fontStyle);
    }

    function syncTextEditorDomFromState(selectionToRestore = null) {
      if (!state.editingText) {
        textEditor.innerHTML = "";
        textEditor.dataset.signature = "";
        return;
      }
      const signature = getTextRunsSignature(state.editingText.text, state.editingText.textRuns, state.editingText.fontStyle);
      if (textEditor.dataset.signature !== signature) {
        textEditor.innerHTML = renderTextRunsHtml(getTextRuns(state.editingText));
        textEditor.dataset.signature = signature;
      }
      if (selectionToRestore) restoreTextEditorSelection(selectionToRestore.start, selectionToRestore.end);
    }

    function applyFontStyleToTextRuns(runs, start, end, fontStyle) {
      const nextRuns = [];
      let cursor = 0;
      normalizeTextRuns(runs.map((run) => run.text).join(""), runs, fontStyle).forEach((run) => {
        const runStart = cursor;
        const runEnd = cursor + run.text.length;
        if (runEnd <= start || runStart >= end) {
          appendTextRun(nextRuns, run.text, run.fontStyle);
        } else {
          const before = run.text.slice(0, Math.max(0, start - runStart));
          const selected = run.text.slice(Math.max(0, start - runStart), Math.max(0, end - runStart));
          const after = run.text.slice(Math.max(0, end - runStart));
          appendTextRun(nextRuns, before, run.fontStyle);
          appendTextRun(nextRuns, selected, fontStyle);
          appendTextRun(nextRuns, after, run.fontStyle);
        }
        cursor = runEnd;
      });
      return nextRuns;
    }

    function applyEditingTextFontStyle(fontStyle) {
      if (!state.editingText) return false;
      const selection = getTextEditorSelectionOffsets();
      if (!selection || selection.start === selection.end) return false;
      syncEditingTextFromEditorDom();
      state.editingText.textRuns = applyFontStyleToTextRuns(getTextRuns(state.editingText), selection.start, selection.end, fontStyle);
      state.editingText.text = state.editingText.textRuns.map((run) => run.text).join("");
      state.editingText.fontStyle = commonValue(state.editingText.textRuns.map((run) => run.fontStyle)) ?? fontStyle;
      state.editingText = ensureTextBoxFitsContent(state.editingText);
      updateToolPreference(TOOL.TEXT, { fontStyle });
      renderTextEditor(selection);
      renderAttributes();
      return true;
    }

    function insertPlainTextIntoEditor(text) {
      if (!text) return;
      if (typeof document.queryCommandSupported === "function" && document.queryCommandSupported("insertText")) {
        document.execCommand("insertText", false, text);
        return;
      }
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      range.deleteContents();
      const node = document.createTextNode(text);
      range.insertNode(node);
      range.setStartAfter(node);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function selectedObjects() {
      const idSet = new Set(state.selectedIds);
      return state.scene.objects.filter((object) => idSet.has(object.id));
    }
    function selectedObject() { return state.selectedIds.length === 1 ? selectedObjects()[0] || null : null; }
    function activePrefs() { return state.activeTool ? state.toolPrefs[state.activeTool] || {} : {}; }

    function getGroupMemberIds(groupId) {
      if (!groupId) return [];
      return state.scene.objects.filter((object) => object.groupId === groupId).map((object) => object.id);
    }

    function getSelectableIdsForObject(object) {
      return object.groupId ? getGroupMemberIds(object.groupId) : [object.id];
    }

    function setSelection(ids) {
      state.selectedIds = uniqueIds(ids).filter((id) => state.scene.objects.some((object) => object.id === id));
    }

    function addToSelection(ids) { setSelection([...state.selectedIds, ...ids]); }
    function removeFromSelection(ids) {
      const removeSet = new Set(ids);
      setSelection(state.selectedIds.filter((id) => !removeSet.has(id)));
    }

    function selectionBounds() {
      return selectedObjects().reduce((acc, object) => unionRect(acc, getObjectBounds(object)), null);
    }

    function currentTargetTypes() {
      const selection = selectedObjects();
      if (selection.length) return selection.map((object) => object.type === "arrow" ? "arrow" : object.type);
      if (state.activeTool === TOOL.ARROW_ONE || state.activeTool === TOOL.ARROW_TWO) return ["arrow"];
      return state.activeTool ? [state.activeTool] : [];
    }

    function pushHistory(scene, actionMeta = {}) {
      const cloned = clone(scene);
      state.history = state.history.slice(0, state.historyIndex + 1);
      state.historyActions = state.historyActions.slice(0, state.historyIndex + 1);
      state.history.push(cloned);
      state.historyIndex = state.history.length - 1;
      state.scene = cloned;
      state.historyActions.push({
        stateIndex: state.historyIndex,
        label: actionMeta.label || "Edit",
        detail: actionMeta.detail || "",
        groupKey: actionMeta.groupKey || null,
      });
      renderAll();
    }

    function initHistory() {
      state.history = [clone(state.scene)];
      state.historyIndex = 0;
      state.historyActions = [{ stateIndex: 0, label: "Initial state", detail: "", groupKey: null }];
    }

    function screenToWorld(point) {
      return { x: (point.x - state.view.offsetX) / state.view.scale, y: (point.y - state.view.offsetY) / state.view.scale };
    }
    function worldToScreen(point) {
      return { x: point.x * state.view.scale + state.view.offsetX, y: point.y * state.view.scale + state.view.offsetY };
    }
    function zoomAt(screenPoint, nextScale) {
      const scale = clamp(nextScale, 0.25, 6);
      const worldPoint = screenToWorld(screenPoint);
      state.view = { scale, offsetX: screenPoint.x - worldPoint.x * scale, offsetY: screenPoint.y - worldPoint.y * scale };
      renderAll();
    }

    function updateCanvasSize() {
      const rect = viewport.getBoundingClientRect();
      state.canvasSize = { width: Math.max(320, Math.floor(rect.width)), height: Math.max(220, Math.floor(rect.height)) };
      const dpr = window.devicePixelRatio || 1;
      canvas.width = state.canvasSize.width * dpr;
      canvas.height = state.canvasSize.height * dpr;
      canvas.style.width = `${state.canvasSize.width}px`;
      canvas.style.height = `${state.canvasSize.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      renderAll();
    }

    function ensureImageCached(dataUrl, onLoad) {
      const cached = state.imageCache[dataUrl];
      if (cached) return cached;
      const img = new Image();
      state.imageCache[dataUrl] = { img, loaded: false };
      img.onload = () => {
        state.imageCache[dataUrl] = { img, loaded: true };
        if (onLoad) onLoad();
      };
      img.src = dataUrl;
      return state.imageCache[dataUrl];
    }

    function drawSelectionOverlay(targetCtx, selectedIds) {
      if (!selectedIds?.length) return;
      const idSet = new Set(selectedIds);
      const selected = state.scene.objects.filter((object) => idSet.has(object.id));
      if (!selected.length) return;
      let union = null;
      targetCtx.save();
      targetCtx.strokeStyle = "#111111";
      targetCtx.lineWidth = 2;
      targetCtx.setLineDash([8, 6]);
      selected.forEach((object) => {
        const bounds = getObjectBounds(object);
        union = unionRect(union, bounds);
        targetCtx.strokeRect(bounds.x - 6, bounds.y - 6, bounds.w + 12, bounds.h + 12);
      });
      if (selected.length > 1 && union) {
        targetCtx.setLineDash([10, 6]);
        targetCtx.lineWidth = 2.5;
        targetCtx.strokeRect(union.x - 10, union.y - 10, union.w + 20, union.h + 20);
      }
      targetCtx.restore();
    }

    function drawScene(targetCtx, scene, options = {}) {
      const backgroundRect = options.backgroundRect || { x: 0, y: 0, w: state.canvasSize.width, h: state.canvasSize.height };
      targetCtx.clearRect(0, 0, state.canvasSize.width, state.canvasSize.height);
      targetCtx.fillStyle = scene.backgroundColor;
      targetCtx.fillRect(backgroundRect.x, backgroundRect.y, backgroundRect.w, backgroundRect.h);
      for (const object of scene.objects) {
        if (object.type === "brush" || object.type === "eraser") drawBrush(targetCtx, object, scene.backgroundColor);
        if (object.type === "line" || object.type === "arrow") drawLine(targetCtx, object);
        if (object.type === "shape") drawShape(targetCtx, object);
        if (object.type === "text") drawTextObject(targetCtx, object);
        if (object.type === "image") {
          const cached = ensureImageCached(object.dataUrl, renderAll);
          if (cached.loaded) {
            targetCtx.save();
            targetCtx.globalAlpha = getAlpha01(object.alpha);
            targetCtx.drawImage(cached.img, object.x, object.y, object.width, object.height);
            targetCtx.restore();
          }
        }
      }
      if (options.preview) {
        const preview = options.preview;
        if (preview.type === "brush" || preview.type === "eraser") drawBrush(targetCtx, preview, scene.backgroundColor);
        if (preview.type === "line" || preview.type === "arrow") drawLine(targetCtx, preview);
        if (preview.type === "shape") drawShape(targetCtx, preview);
      }
      drawSelectionOverlay(targetCtx, options.selectedIds);
    }

    function renderCanvas() {
      const backgroundRect = {
        x: -state.view.offsetX / state.view.scale,
        y: -state.view.offsetY / state.view.scale,
        w: state.canvasSize.width / state.view.scale,
        h: state.canvasSize.height / state.view.scale,
      };
      ctx.clearRect(0, 0, state.canvasSize.width, state.canvasSize.height);
      ctx.save();
      ctx.translate(state.view.offsetX, state.view.offsetY);
      ctx.scale(state.view.scale, state.view.scale);
      drawScene(ctx, state.scene, { preview: state.draft, selectedIds: state.selectedIds, backgroundRect });
      ctx.restore();
    }

    function renderTextEditor(selectionToRestore = null) {
      if (!state.editingText) {
        textEditor.style.display = "none";
        syncTextEditorDomFromState();
        return;
      }
      const screen = worldToScreen({ x: state.editingText.x, y: state.editingText.y });
      textEditor.style.display = "block";
      textEditor.style.left = `${screen.x}px`;
      textEditor.style.top = `${screen.y}px`;
      textEditor.style.width = `${Math.max(80, state.editingText.width * state.view.scale)}px`;
      textEditor.style.height = `${Math.max(34, state.editingText.height * state.view.scale)}px`;
      textEditor.style.minHeight = `${Math.max(34, state.editingText.size * state.view.scale * 1.2)}px`;
      textEditor.style.color = state.editingText.color;
      textEditor.style.opacity = `${state.editingText.alpha / 100}`;
      syncTextEditorDomFromState(selectionToRestore);
      updateTextEditorVisuals();
    }

    function renderTools() {
      const grid = $("toolsGrid");
      grid.innerHTML = "";
      for (const tool of TOOL_ORDER) {
        const btn = document.createElement("button");
        btn.className = "tool-btn";
        const active =
          (tool === TOOL.SELECT && state.selectMode && !state.multiSelectMode) ||
          (tool === TOOL.MULTI_SELECT && state.selectMode && state.multiSelectMode) ||
          (tool !== TOOL.SELECT && tool !== TOOL.MULTI_SELECT && tool !== TOOL.GROUP && state.activeTool === tool);
        if (active) btn.classList.add("active");
        btn.textContent = TOOL_LABEL[tool];
        btn.addEventListener("click", () => toggleTool(tool));
        grid.appendChild(btn);
      }
      $("elementsBtn").classList.toggle("active", state.panels.open === "elements");
      $("logBtn").classList.toggle("active", state.panels.open === "log");
    }

    function renderShapes() {
      const grid = $("shapeGrid");
      grid.innerHTML = "";
      const selection = selectedObjects().filter((object) => object.type === "shape" || object.type === "eraser");
      const currentShape = selection.length
        ? (commonValue(selection.map((object) => object.shape)) ?? selection[0].shape)
        : activePrefs().shape;
      for (const shape of SHAPES) {
        const btn = document.createElement("button");
        btn.className = "btn";
        if (currentShape === shape) btn.classList.add("active");
        btn.style.minHeight = "26px";
        btn.style.fontSize = "10px";
        btn.textContent = shape;
        btn.addEventListener("click", () => applyAttributesPatch({ shape }, { label: "Change shape", groupKey: "attr-shape" }));
        grid.appendChild(btn);
      }
    }

    function currentShapeTargetColours() {
      return currentColourTargetValues(selectedObjects());
    }

    function resolveCurrentSwatchColour() {
      const selection = selectedObjects();
      if (selection.length) {
        const nonTargeted = selection.filter((object) => !objectUsesColourTargets(object));
        const targeted = selection.filter((object) => objectUsesColourTargets(object));
        if (nonTargeted.length && !targeted.length) return commonValue(nonTargeted.map((object) => object.color)) ?? nonTargeted[0].color;
        if (targeted.length && !nonTargeted.length && (state.shapeColourTargets.fill || state.shapeColourTargets.stroke)) {
          const targetColours = currentColourTargetValues(targeted);
          const selectedColours = [];
          if (state.shapeColourTargets.fill) selectedColours.push(targetColours.fillColour);
          if (state.shapeColourTargets.stroke) selectedColours.push(targetColours.strokeColour);
          if (!selectedColours.length) return undefined;
          return selectedColours.every((value) => value === selectedColours[0]) ? selectedColours[0] : undefined;
        }
        if (selection.every((object) => object.type === "text")) {
          return commonValue(selection.map((object) => object.color)) ?? selection[0].color;
        }
        return undefined;
      }
      if (state.activeTool === TOOL.BACKGROUND) return state.scene.backgroundColor;
      if ((state.activeTool === TOOL.SHAPE) || (state.activeTool === TOOL.TEXT && state.toolPrefs[TOOL.TEXT].boxed && (state.shapeColourTargets.fill || state.shapeColourTargets.stroke))) {
        const targetColours = currentColourTargetValues([]);
        const colours = [];
        if (state.shapeColourTargets.fill) colours.push(targetColours.fillColour);
        if (state.shapeColourTargets.stroke) colours.push(targetColours.strokeColour);
        return colours.length === 1 || colours.every((value) => value === colours[0]) ? colours[0] : undefined;
      }
      return activePrefs().color;
    }

    function renderColours() {
      const grid = $("colourGrid");
      grid.innerHTML = "";
      const currentColour = resolveCurrentSwatchColour();
      for (const swatch of COLOUR_SWATCHES) {
        const btn = document.createElement("button");
        btn.className = "swatch";
        if (currentColour === swatch) btn.classList.add("active");
        btn.style.background = swatch;
        btn.addEventListener("click", () => applyAttributesPatch({ color: swatch }, { label: "Change colour", groupKey: "attr-colour" }));
        grid.appendChild(btn);
      }
    }

    function renderShapeColourTargets() {
      const targets = currentShapeTargetColours();
      $("fillTargetInput").checked = !!state.shapeColourTargets.fill;
      $("strokeTargetInput").checked = !!state.shapeColourTargets.stroke;
      $("fillPreview").style.background = targets.fillColour || "#000000";
      $("strokePreview").style.background = targets.strokeColour || "#000000";
    }

    function renderOptionGrid(gridId, options, currentValue, onSelect) {
      const grid = $(gridId);
      grid.innerHTML = "";
      options.forEach((option) => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.style.minHeight = "26px";
        btn.style.fontSize = "10px";
        if (currentValue === option.value) btn.classList.add("active");
        btn.textContent = option.label;
        btn.addEventListener("click", () => onSelect(option.value));
        grid.appendChild(btn);
      });
    }

    function renderAttributes() {
      const types = currentTargetTypes();
      const selection = selectedObjects();
      const selectionOrPrefs = (prop, fallback) => {
        if (selection.length) {
          const values = selection.map((object) => object[prop]).filter((value) => value !== undefined);
          return commonValue(values) ?? values[0] ?? fallback;
        }
        return fallback;
      };
      const supportsSize = types.some((type) => ["brush", "eraser", "line", "shape", "arrow", "text", "image"].includes(type));
      const supportsAlpha = types.some((type) => ["brush", "eraser", "line", "shape", "arrow", "text", "image"].includes(type));
      const supportsColour = types.some((type) => ["brush", "line", "shape", "arrow", "text", TOOL.BACKGROUND].includes(type));
      const supportsShapeTool = types.length > 0 && types.every((type) => ["eraser", "shape"].includes(type));
      const supportsShapeSpecific = types.length > 0 && types.every((type) => type === "shape");
      const supportsTextOptions = types.length > 0 && types.every((type) => type === "text");
      const boxedTextContext = supportsTextOptions && (selection.length ? selection.every((object) => !!object.boxed) : !!state.toolPrefs[TOOL.TEXT].boxed);
      const supportsColourTargets = supportsShapeSpecific || boxedTextContext;
      const supportsStrokeField = supportsShapeSpecific || boxedTextContext;
      const supportsArrowOptions = types.length > 0 && types.every((type) => ["line", "arrow", "brush"].includes(type));
      const supportsBackgroundRgb = state.activeTool === TOOL.BACKGROUND && !selection.length;
      const supportsGeneral = supportsSize || supportsAlpha || supportsColour;
      const supportsToolAttributes = supportsShapeTool || supportsShapeSpecific || supportsTextOptions || supportsArrowOptions || supportsBackgroundRgb;

      $("attributesSection").style.display = supportsGeneral ? "flex" : "none";
      $("toolAttributesSection").style.display = supportsToolAttributes ? "flex" : "none";
      $("toolAttributesDivider").style.display = supportsToolAttributes ? "block" : "none";
      $("sizeField").style.display = supportsSize ? "flex" : "none";
      $("alphaField").style.display = supportsAlpha ? "flex" : "none";
      $("colourField").style.display = supportsColour ? "flex" : "none";
      $("shapeField").style.display = supportsShapeTool ? "flex" : "none";
      $("strokeField").style.display = supportsStrokeField ? "flex" : "none";
      $("shapeTargetField").style.display = supportsColourTargets ? "flex" : "none";
      $("lineArrowField").style.display = supportsArrowOptions ? "flex" : "none";
      $("textStyleField").style.display = supportsTextOptions ? "flex" : "none";
      $("textAlignField").style.display = supportsTextOptions ? "flex" : "none";
      $("textBoxField").style.display = supportsTextOptions ? "flex" : "none";
      $("backgroundRgbField").style.display = supportsBackgroundRgb ? "grid" : "none";

      const currentSize = selection.length
        ? (selection.length === 1 && selection[0].type === "image"
            ? state.toolPrefs.image.scalePercent
            : selectionOrPrefs("size", activePrefs().size ?? 1))
        : activePrefs().size ?? 1;
      const currentAlpha = selection.length ? (selectionOrPrefs("alpha", activePrefs().alpha ?? 100)) : (activePrefs().alpha ?? 100);
      const currentStrokeValues = selection.map((object) => object.type === "text" ? object.boxStroke : object.stroke).filter((value) => value !== undefined);
      const currentStroke = selection.length
        ? (commonValue(currentStrokeValues) ?? currentStrokeValues[0] ?? (supportsTextOptions ? activePrefs().boxStroke ?? 2 : activePrefs().stroke ?? 3))
        : (supportsTextOptions ? activePrefs().boxStroke ?? 2 : activePrefs().stroke ?? 3);
      const currentStartHead = selection.length ? (selectionOrPrefs("startHead", activePrefs().startHead ?? false)) : (activePrefs().startHead ?? false);
      const currentEndHead = selection.length ? (selectionOrPrefs("endHead", activePrefs().endHead ?? false)) : (activePrefs().endHead ?? false);
      const currentFontStyle = selection.length ? (selectionOrPrefs("fontStyle", activePrefs().fontStyle ?? "regular")) : (activePrefs().fontStyle ?? "regular");
      const currentAlign = selection.length ? (selectionOrPrefs("align", activePrefs().align ?? "left")) : (activePrefs().align ?? "left");
      const currentBoxed = selection.length ? (selectionOrPrefs("boxed", activePrefs().boxed ?? false)) : (activePrefs().boxed ?? false);
      const backgroundRgb = {
        r: parseInt(state.scene.backgroundColor.slice(1, 3), 16),
        g: parseInt(state.scene.backgroundColor.slice(3, 5), 16),
        b: parseInt(state.scene.backgroundColor.slice(5, 7), 16),
      };

      $("sizeInput").value = Number.isFinite(Number(currentSize)) ? currentSize : "";
      $("alphaInput").value = Number.isFinite(Number(currentAlpha)) ? currentAlpha : 100;
      $("alphaValue").textContent = String(Number.isFinite(Number(currentAlpha)) ? currentAlpha : 100);
      $("strokeInput").value = Number.isFinite(Number(currentStroke)) ? currentStroke : 3;
      $("lineStartHeadToolInput").checked = !!currentStartHead;
      $("lineEndHeadToolInput").checked = !!currentEndHead;
      $("bgR").value = backgroundRgb.r;
      $("bgG").value = backgroundRgb.g;
      $("bgB").value = backgroundRgb.b;

      if (supportsShapeTool) renderShapes();
      if (supportsColour) renderColours();
      if (supportsColourTargets) renderShapeColourTargets();
      if (supportsTextOptions) {
        renderOptionGrid("textStyleGrid", [
          { value: "regular", label: "Regular" },
          { value: "italic", label: "Italic" },
          { value: "bold", label: "Bold" },
        ], currentFontStyle, (fontStyle) => applyAttributesPatch({ fontStyle }, { label: "Change typeface", groupKey: "text-style" }));
        renderOptionGrid("textAlignGrid", [
          { value: "left", label: "Left" },
          { value: "center", label: "Center" },
          { value: "right", label: "Right" },
        ], currentAlign, (align) => applyAttributesPatch({ align }, { label: "Change text alignment", groupKey: "text-align" }));
        renderOptionGrid("textBoxGrid", [
          { value: true, label: "On" },
          { value: false, label: "Off" },
        ], !!currentBoxed, (boxed) => applyAttributesPatch({ boxed }, { label: "Toggle text box", groupKey: "text-box" }));
      }
    }

    function jumpToHistoryState(index) {
      if (index < 0 || index >= state.history.length) return;
      state.historyIndex = index;
      state.scene = clone(state.history[index]);
      state.draft = null;
      state.interaction = null;
      state.editingText = null;
      setSelection([]);
      renderAll();
    }

    function buildLogGroups() {
      const actions = state.historyActions;
      const groups = [];
      if (!actions.length) return groups;
      groups.push({ type: "single", entry: actions[0] });
      let current = null;
      for (let i = 1; i < actions.length; i += 1) {
        const entry = actions[i];
        if (entry.groupKey && current && current.groupKey === entry.groupKey) {
          current.entries.push(entry);
        } else {
          current = { type: "group", groupKey: entry.groupKey, entries: [entry] };
          groups.push(current);
        }
      }
      return groups.map((group, index) => {
        if (group.type === "single") return group;
        if (!group.groupKey || group.entries.length === 1) return { type: "single", entry: group.entries[0] };
        return { ...group, id: `${group.groupKey}_${index}` };
      });
    }

    function renderLogPanel() {
      sidePanelTitle.textContent = "Log";
      sidePanelBody.innerHTML = "";
      const note = document.createElement("div");
      note.className = "muted-note";
      note.textContent = "Click an entry to move the canvas back to that state.";
      sidePanelBody.appendChild(note);

      const list = document.createElement("div");
      list.className = "list";
      const groups = buildLogGroups();
      groups.forEach((group) => {
        if (group.type === "single") {
          const row = document.createElement("div");
          row.className = "list-row";
          if (state.historyIndex === group.entry.stateIndex) row.classList.add("selected");
          const main = document.createElement("div");
          main.className = "row-main";
          main.innerHTML = `
            <div class="row-main-text">
              <div class="row-title">${group.entry.label}</div>
              <div class="row-subtitle">State ${group.entry.stateIndex}</div>
            </div>
          `;
          main.addEventListener("click", () => jumpToHistoryState(group.entry.stateIndex));
          row.appendChild(main);
          list.appendChild(row);
          return;
        }

        const isOpen = !!state.logGroupOpen[group.id];
        const row = document.createElement("div");
        row.className = "list-row";
        if (state.historyIndex === group.entries[group.entries.length - 1].stateIndex) row.classList.add("selected");

        const fold = document.createElement("button");
        fold.className = "fold-btn";
        fold.type = "button";
        fold.textContent = isOpen ? "▾" : "▸";
        fold.addEventListener("click", (event) => {
          event.stopPropagation();
          state.logGroupOpen[group.id] = !isOpen;
          renderSidePanel();
        });

        const main = document.createElement("div");
        main.className = "row-main";
        const last = group.entries[group.entries.length - 1];
        main.innerHTML = `
          <span class="pill neutral">${group.entries.length} actions</span>
          <div class="row-main-text">
            <div class="row-title">${last.label}</div>
            <div class="row-subtitle">States ${group.entries[0].stateIndex}–${last.stateIndex}</div>
          </div>
        `;
        main.addEventListener("click", () => jumpToHistoryState(last.stateIndex));
        row.appendChild(fold);
        row.appendChild(main);
        list.appendChild(row);

        if (isOpen) {
          const children = document.createElement("div");
          children.className = "log-children";
          group.entries.forEach((entry) => {
            const child = document.createElement("div");
            child.className = "list-row";
            if (state.historyIndex === entry.stateIndex) child.classList.add("selected");
            const childMain = document.createElement("div");
            childMain.className = "row-main";
            childMain.innerHTML = `
              <div class="row-main-text">
                <div class="row-title">${entry.label}</div>
                <div class="row-subtitle">State ${entry.stateIndex}</div>
              </div>
            `;
            childMain.addEventListener("click", () => jumpToHistoryState(entry.stateIndex));
            child.appendChild(childMain);
            children.appendChild(child);
          });
          list.appendChild(children);
        }
      });

      sidePanelBody.appendChild(list);
    }

    function sortElementMetaList(metaList) {
      if (state.panels.elementSort === "tool") {
        return [...metaList].sort((a, b) => a.baseLabel.localeCompare(b.baseLabel) || a.timeIndex - b.timeIndex);
      }
      return [...metaList].sort((a, b) => a.timeIndex - b.timeIndex);
    }

    function copyElementsByIds(ids) {
      const idSet = new Set(ids);
      const objects = state.scene.objects.filter((object) => idSet.has(object.id));
      if (!objects.length) return;
      state.elementClipboard = clone(objects);
      state.lastClipboardSource = "elements";
      state.clipboardPasteCount = 0;
      renderSidePanel();
    }

    function copySelectedElements() {
      if (!state.selectedIds.length) return;
      copyElementsByIds(state.selectedIds);
    }

    function pasteClipboardElements() {
      if (!state.elementClipboard?.length) return;
      const offset = 20 + state.clipboardPasteCount * 10;
      const groupMap = {};
      const pasted = state.elementClipboard.map((object) => {
        const copy = clone(object);
        copy.id = makeId(copy.type || "item");
        if (copy.groupId) {
          if (!groupMap[copy.groupId]) groupMap[copy.groupId] = makeId("group");
          copy.groupId = groupMap[copy.groupId];
        }
        return normalizeObject(translateObject(copy, offset, offset));
      });
      const nextScene = clone(state.scene);
      nextScene.objects.push(...pasted);
      state.clipboardPasteCount += 1;
      pushHistory(nextScene, { label: "Paste elements", groupKey: "paste-elements" });
      setSelection(pasted.map((object) => object.id));
      renderAll();
    }

    function deleteSelectedElements() {
      if (!state.selectedIds.length) return;
      const removeSet = new Set(state.selectedIds);
      const nextScene = clone(state.scene);
      nextScene.objects = nextScene.objects.filter((object) => !removeSet.has(object.id));
      pushHistory(nextScene, { label: "Delete selection", groupKey: "delete-selection" });
      setSelection([]);
      renderAll();
    }

    function handleElementRowSelection(ids, additive) {
      if (additive) {
        const allSelected = ids.every((id) => state.selectedIds.includes(id));
        if (allSelected) removeFromSelection(ids);
        else addToSelection(ids);
      } else {
        setSelection(ids);
      }
      renderAll();
    }

    function renderElementsPanel() {
      sidePanelTitle.textContent = "Elements";
      sidePanelBody.innerHTML = "";

      const toolbar = document.createElement("div");
      toolbar.className = "panel-toolbar";

      const timeBtn = document.createElement("button");
      timeBtn.className = `mini-btn ${state.panels.elementSort === "time" ? "active" : ""}`;
      timeBtn.type = "button";
      timeBtn.textContent = "Sort: time";
      timeBtn.addEventListener("click", () => { state.panels.elementSort = "time"; renderSidePanel(); });

      const toolBtn = document.createElement("button");
      toolBtn.className = `mini-btn ${state.panels.elementSort === "tool" ? "active" : ""}`;
      toolBtn.type = "button";
      toolBtn.textContent = "Sort: tool";
      toolBtn.addEventListener("click", () => { state.panels.elementSort = "tool"; renderSidePanel(); });

      const copyBtn = document.createElement("button");
      copyBtn.className = "mini-btn";
      copyBtn.type = "button";
      copyBtn.textContent = "Copy sel";
      copyBtn.disabled = !state.selectedIds.length;
      copyBtn.addEventListener("click", copySelectedElements);

      const pasteBtn = document.createElement("button");
      pasteBtn.className = "mini-btn";
      pasteBtn.type = "button";
      pasteBtn.textContent = "Paste";
      pasteBtn.disabled = !state.elementClipboard?.length;
      pasteBtn.addEventListener("click", pasteClipboardElements);

      toolbar.append(timeBtn, toolBtn, copyBtn, pasteBtn);
      sidePanelBody.appendChild(toolbar);

      const list = document.createElement("div");
      list.className = "list";
      const metaList = sortElementMetaList(getElementMetaList(state.scene));
      metaList.forEach((meta) => {
        const row = document.createElement("div");
        row.className = "list-row";
        if (state.selectedIds.includes(meta.object.id)) row.classList.add("selected");

        const main = document.createElement("div");
        main.className = "row-main";
        const subtitleParts = [`${meta.baseLabel}`, `#${meta.timeIndex + 1}`];
        if (meta.object.groupId) subtitleParts.push("grouped");
        const detail = describeElement(meta.object);
        if (detail) subtitleParts.push(detail);
        main.innerHTML = `
          ${meta.object.groupId ? '<span class="pill">Group</span>' : ''}
          <div class="row-main-text">
            <div class="row-title">${meta.label}</div>
            <div class="row-subtitle">${subtitleParts.join(" · ")}</div>
          </div>
        `;
        main.addEventListener("click", (event) => {
          handleElementRowSelection(getSelectableIdsForObject(meta.object), event.ctrlKey || event.metaKey || state.multiSelectMode);
        });

        const copyOne = document.createElement("button");
        copyOne.className = "mini-btn";
        copyOne.type = "button";
        copyOne.textContent = "Copy";
        copyOne.addEventListener("click", (event) => {
          event.stopPropagation();
          copyElementsByIds(getSelectableIdsForObject(meta.object));
        });

        row.appendChild(main);
        row.appendChild(copyOne);
        list.appendChild(row);
      });

      sidePanelBody.appendChild(list);
    }

    function renderSidePanel() {
      if (!state.panels.open) {
        sidePanel.classList.remove("show");
        return;
      }
      sidePanel.classList.add("show");
      if (state.panels.open === "log") renderLogPanel();
      if (state.panels.open === "elements") renderElementsPanel();
    }

    function closeLineMenu() {}

    function openLineMenu() {
      // removed in update 13
    }

    function renderLineMenu() {}

    function renderAll() {
      renderTools();
      renderAttributes();
      renderCanvas();
      renderTextEditor();
      renderSidePanel();
    }

    function updateToolPreference(tool, patch) {
      state.toolPrefs[tool] = { ...(state.toolPrefs[tool] || {}), ...patch };
    }

    function applyAttributesPatch(inputPatch, actionMeta = {}) {
      const patch = clone(inputPatch);
      const selection = selectedObjects();
      if (patch.fontStyle && state.activeTool === TOOL.TEXT && state.editingText && applyEditingTextFontStyle(patch.fontStyle)) {
        return;
      }
      if (patch.color && (selection.length || state.activeTool !== TOOL.BACKGROUND)) {
        rememberExplicitColourChoice(patch.color, selection);
      }
      if (selection.length) {
        const nextScene = clone(state.scene);
        const idSet = new Set(state.selectedIds);
        nextScene.objects = nextScene.objects.map((object) => {
          if (!idSet.has(object.id)) return object;
          if (patch.color) return updateObjectAttributes(object, applyTargetedColourPatch(object, patch.color));
          return updateObjectAttributes(object, patch);
        });
        pushHistory(nextScene, actionMeta);
        return;
      }

      if (state.activeTool === TOOL.BACKGROUND && patch.color) {
        const nextScene = clone(state.scene);
        nextScene.backgroundColor = patch.color;
        updateToolPreference(TOOL.BACKGROUND, { color: patch.color });
        pushHistory(nextScene, actionMeta.label ? actionMeta : { label: "Change background colour", groupKey: "background-colour" });
        return;
      }

      if (state.activeTool === TOOL.SHAPE && patch.color) {
        updateToolPreference(TOOL.SHAPE, applyShapeColourPatchToShape(patch.color));
        renderAll();
        return;
      }

      if (state.activeTool === TOOL.TEXT && patch.color && state.toolPrefs[TOOL.TEXT].boxed && (state.shapeColourTargets.fill || state.shapeColourTargets.stroke)) {
        updateToolPreference(TOOL.TEXT, applyShapeColourPatchToTextBox(patch.color));
        if (state.editingText) state.editingText = updateObjectAttributes({ type: "text", ...state.editingText }, applyShapeColourPatchToTextBox(patch.color));
        renderAll();
        return;
      }

      if (state.activeTool) {
        updateToolPreference(state.activeTool, patch);
        if (state.activeTool === TOOL.TEXT && state.editingText) {
          state.editingText = updateObjectAttributes({ type: "text", ...state.editingText }, patch);
          if (typeof patch.boxed === "boolean") syncEditingTextColour();
        }
        if (typeof patch.boxed === "boolean") applySharedColourToCurrentContext();
        renderAll();
      }
    }

    function startTextAt(worldPoint) {
      const prefs = state.toolPrefs[TOOL.TEXT];
      state.editingText = normalizeTextObject({
        x: worldPoint.x,
        y: worldPoint.y,
        text: "",
        size: prefs.size,
        color: prefs.color,
        alpha: prefs.alpha,
        fontStyle: prefs.fontStyle,
        align: prefs.align,
        boxed: prefs.boxed,
        boxFillColor: prefs.boxFillColor,
        boxStrokeColor: prefs.boxStrokeColor,
        boxStroke: prefs.boxStroke,
        width: prefs.width,
        height: prefs.height,
      });
      renderTextEditor();
      requestAnimationFrame(() => textEditor.focus());
      setTimeout(() => textEditor.focus(), 0);
    }

    function commitEditingText() {
      if (state.editingText) syncEditingTextFromEditorDom();
      if (!state.editingText || !state.editingText.text.trim()) {
        state.editingText = null;
        renderTextEditor();
        return;
      }
      updateTextEditorBoxMetricsFromDom();
      const nextScene = clone(state.scene);
      const newTextObject = normalizeTextObject({
        id: makeId("text"), type: "text", x: state.editingText.x, y: state.editingText.y,
        text: state.editingText.text, size: state.editingText.size, color: state.editingText.color, alpha: state.editingText.alpha,
        fontStyle: state.editingText.fontStyle, align: state.editingText.align, boxed: state.editingText.boxed,
        boxFillColor: state.editingText.boxFillColor, boxStrokeColor: state.editingText.boxStrokeColor, boxStroke: state.editingText.boxStroke,
        textRuns: state.editingText.textRuns,
        width: state.editingText.width, height: state.editingText.height,
      });
      nextScene.objects.push(newTextObject);
      pushHistory(nextScene, { label: "Add text" });
      state.toolPrefs[TOOL.TEXT] = { ...state.toolPrefs[TOOL.TEXT], width: newTextObject.width, height: newTextObject.height };
      state.editingText = null;
      setSelection([newTextObject.id]);
      renderAll();
    }

    function toggleTool(tool) {
      if (state.activeTool === TOOL.TEXT && state.editingText) commitEditingText();

      if (tool === TOOL.GROUP) {
        groupSelection();
        return;
      }

      if (tool === TOOL.SELECT) {
        const makeInactive = state.selectMode && !state.multiSelectMode;
        state.selectMode = !makeInactive;
        state.multiSelectMode = false;
        state.activeTool = null;
        state.draft = null;
        state.interaction = null;
        if (!state.selectMode) setSelection([]);
        renderAll();
        return;
      }

      if (tool === TOOL.MULTI_SELECT) {
        const makeInactive = state.selectMode && state.multiSelectMode;
        state.selectMode = !makeInactive;
        state.multiSelectMode = !makeInactive;
        state.activeTool = null;
        state.draft = null;
        state.interaction = null;
        if (!state.selectMode) setSelection([]);
        renderAll();
        return;
      }

      const nextTool = state.activeTool === tool ? null : tool;
      state.activeTool = nextTool;
      state.selectMode = false;
      state.multiSelectMode = false;
      state.draft = null;
      state.interaction = null;
      setSelection([]);
      applySharedColourToCurrentContext();
      renderAll();
    }

    function clearCanvasNow() {
      updateToolPreference(TOOL.BACKGROUND, { color: "#ffffff" });
      state.scene = { backgroundColor: "#ffffff", objects: [] };
      initHistory();
      setSelection([]);
      state.draft = null;
      state.interaction = null;
      state.editingText = null;
      state.view = { scale: 1, offsetX: 0, offsetY: 0 };
      confirmOverlay.classList.remove("show");
      renderAll();
    }

    function addImage(dataUrl) {
      const img = new Image();
      img.onload = () => {
        const maxW = state.canvasSize.width * 0.5 / state.view.scale;
        const maxH = state.canvasSize.height * 0.4 / state.view.scale;
        const scale = Math.min(maxW / img.width, maxH / img.height, 1);
        const width = Math.max(40, img.width * scale);
        const height = Math.max(40, img.height * scale);
        const center = screenToWorld({ x: state.canvasSize.width / 2, y: state.canvasSize.height / 2 });
        const nextScene = clone(state.scene);
        const object = { id: makeId("img"), type: "image", dataUrl, x: center.x - width / 2, y: center.y - height / 2, width, height, alpha: 100 };
        nextScene.objects.push(object);
        pushHistory(nextScene, { label: "Insert image" });
        state.toolPrefs.image = { ...state.toolPrefs.image, scalePercent: 100, alpha: 100 };
        setSelection([object.id]);
        renderAll();
      };
      img.src = dataUrl;
    }

    function handleImageUpload(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => addImage(reader.result);
      reader.readAsDataURL(file);
      event.target.value = "";
    }

    async function pasteImageFromClipboard() {
      if (!navigator.clipboard?.read) return false;
      try {
        const items = await navigator.clipboard.read();
        const imageItem = items.find((item) => item.types.some((type) => type.startsWith("image/")));
        if (!imageItem) return false;
        const imageType = imageItem.types.find((type) => type.startsWith("image/"));
        const blob = await imageItem.getType(imageType);
        await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            addImage(reader.result);
            resolve();
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
        state.lastClipboardSource = "image";
        return true;
      } catch {
        return false;
      }
    }

    function resizeSelectedImage(percent) {
      const sel = selectedObject();
      if (!sel || sel.type !== "image") return;
      const currentPercent = state.toolPrefs.image.scalePercent || 100;
      const ratio = percent / currentPercent;
      const nextScene = clone(state.scene);
      const target = nextScene.objects.find((obj) => obj.id === sel.id);
      if (!target) return;
      const cx = target.x + target.width / 2;
      const cy = target.y + target.height / 2;
      target.width = Math.max(20, target.width * ratio);
      target.height = Math.max(20, target.height * ratio);
      target.x = cx - target.width / 2;
      target.y = cy - target.height / 2;
      state.toolPrefs.image = { ...state.toolPrefs.image, scalePercent: percent };
      pushHistory(nextScene, { label: "Resize image", groupKey: "resize-image" });
    }

    function buildShapeObject(start, end) {
      const prefs = activePrefs();
      const usePreset = distance(start, end) < 4;
      let rect;
      if (usePreset) {
        const size = prefs.size || 90;
        rect = { x: start.x - size / 2, y: start.y - size / 2, w: size, h: size };
      } else {
        rect = rectFromPoints(start, end);
        if (["circle", "square", "hexagon"].includes(prefs.shape)) {
          const side = Math.max(rect.w, rect.h);
          const extendX = end.x >= start.x ? 1 : -1;
          const extendY = end.y >= start.y ? 1 : -1;
          rect = {
            x: start.x + (extendX < 0 ? -side : 0),
            y: start.y + (extendY < 0 ? -side : 0),
            w: side,
            h: side,
          };
        }
      }
      return normalizeShapeObject({
        id: makeId("shape"), type: "shape", x: rect.x, y: rect.y, w: rect.w, h: rect.h,
        shape: prefs.shape, fillColor: prefs.fillColor, strokeColor: prefs.strokeColor, stroke: prefs.stroke || 3, alpha: prefs.alpha ?? 100,
      });
    }

    function renderExportCanvas() {
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = state.canvasSize.width;
      exportCanvas.height = state.canvasSize.height;
      const exportCtx = exportCanvas.getContext("2d");
      const exportScene = clone(state.scene);
      if (state.editingText && state.editingText.text.trim()) {
        exportScene.objects.push(normalizeTextObject({
          id: "text_preview_export", type: "text", x: state.editingText.x, y: state.editingText.y,
          text: state.editingText.text, size: state.editingText.size, color: state.editingText.color, alpha: state.editingText.alpha,
          fontStyle: state.editingText.fontStyle, align: state.editingText.align, boxed: state.editingText.boxed,
          boxFillColor: state.editingText.boxFillColor, boxStrokeColor: state.editingText.boxStrokeColor, boxStroke: state.editingText.boxStroke,
          textRuns: state.editingText.textRuns,
          width: state.editingText.width, height: state.editingText.height,
        }));
      }
      const backgroundRect = {
        x: -state.view.offsetX / state.view.scale,
        y: -state.view.offsetY / state.view.scale,
        w: state.canvasSize.width / state.view.scale,
        h: state.canvasSize.height / state.view.scale,
      };
      exportCtx.save();
      exportCtx.translate(state.view.offsetX, state.view.offsetY);
      exportCtx.scale(state.view.scale, state.view.scale);
      drawScene(exportCtx, exportScene, { backgroundRect });
      exportCtx.restore();
      return exportCanvas;
    }

    function saveCanvas() {
      try {
        const exportCanvas = renderExportCanvas();
        const url = exportCanvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = url;
        link.download = `eek-a-sketch_${new Date().toISOString().replace(/[:.]/g, "-")}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
      } catch {
        // ignore
      }
    }

    async function copyCanvas() {
      try {
        const exportCanvas = renderExportCanvas();
        const blob = await new Promise((resolve) => exportCanvas.toBlob(resolve, "image/png"));
