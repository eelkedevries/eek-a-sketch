<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>eek-a-sketch</title>
  <style>
    :root {
      --panel-w: 172px;
      --bg: #e5e7eb;
      --panel: rgba(255,255,255,.96);
      --border: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --active: #111111;
      --danger: #dc2626;
      --radius: 12px;
      --shadow: 0 12px 24px rgba(0,0,0,.12);
      --min-btn-h: 34px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    #viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background: var(--bg);
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: crosshair;
    }

    #sidebar {
      position: absolute;
      left: 8px;
      top: 8px;
      width: var(--panel-w);
      max-height: calc(100vh - 16px);
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      z-index: 20;
      overflow: hidden;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      flex: 0 0 auto;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 0 0 auto;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .grid-2, .grid-3, .grid-5 {
      display: grid;
      gap: 4px;
    }
    .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-5 { grid-template-columns: repeat(5, minmax(0,1fr)); }

    .btn, .tool-btn {
      min-height: var(--min-btn-h);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      padding: 6px 8px;
      line-height: 1.2;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .btn:hover, .tool-btn:hover { background: #f8fafc; }
    .tool-btn.active, .btn.active {
      background: var(--active);
      border-color: var(--active);
      color: #fff;
    }
    .btn.danger {
      background: var(--danger);
      border-color: #f87171;
      color: #fff;
    }
    .btn:disabled, .tool-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }

    .stepper {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .stepper input[type="number"] {
      width: 46px;
      border: 0;
      padding: 6px 4px;
      font-size: 11px;
      outline: none;
      background: transparent;
    }
    .stepper-side {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .stepper-side button {
      width: 18px;
      height: 16px;
      border: 0;
      background: #fff;
      font-size: 9px;
      cursor: pointer;
    }
    .stepper-side button + button { border-top: 1px solid var(--border); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    input[type="range"] { width: 100%; }
    .slider-value {
      width: 30px;
      text-align: right;
      font-size: 10px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .swatch {
      width: 100%;
      height: 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
    }
    .swatch.active {
      border-color: #111;
      box-shadow: 0 0 0 2px #111 inset;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    #textEditor {
      position: absolute;
      z-index: 30;
      min-width: 120px;
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid #111;
      border-radius: 8px;
      background: rgba(255,255,255,.96);
      outline: none;
      resize: both;
      font: inherit;
      display: none;
    }

    #confirmOverlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.4);
      padding: 16px;
    }
    #confirmOverlay.show { display: flex; }
    .dialog {
      width: min(360px, 100%);
      background: white;
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,.24);
      padding: 16px;
    }
    .dialog-title { font-weight: 700; }
    .dialog-text { margin-top: 8px; font-size: 14px; color: #475569; }
    .dialog-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <input id="fileInput" type="file" accept="image/*" hidden />
    <div id="viewport">
      <canvas id="canvas"></canvas>
      <textarea id="textEditor" placeholder="Type here" rows="2"></textarea>

      <div id="sidebar">
        <div class="section">
          <div class="grid-2">
            <button id="undoBtn" class="btn">Undo</button>
            <button id="redoBtn" class="btn">Redo</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section">
          <div class="section-title">TOOLS</div>
          <div id="toolsGrid" class="grid-2"></div>
        </div>

        <div class="divider"></div>

        <div id="attributesSection" class="section">
          <div class="section-title">ATTRIBUTES</div>

          <div id="sizeField" class="field">
            <div class="field-label">Size</div>
            <div class="stepper">
              <input id="sizeInput" type="number" min="1" max="300" />
              <div class="stepper-side">
                <button id="sizeUp" type="button">▲</button>
                <button id="sizeDown" type="button">▼</button>
              </div>
            </div>
          </div>

          <div id="shapeField" class="field">
            <div class="field-label">Shape</div>
            <div id="shapeGrid" class="grid-2"></div>
          </div>

          <div id="alphaField" class="field">
            <div class="field-label">Alpha</div>
            <div class="slider-row">
              <input id="alphaInput" type="range" min="0" max="100" step="1" />
              <span id="alphaValue" class="slider-value">100</span>
            </div>
          </div>

          <div id="strokeField" class="field">
            <div class="field-label">Stroke</div>
            <div class="stepper">
              <input id="strokeInput" type="number" min="0" max="60" />
              <div class="stepper-side">
                <button id="strokeUp" type="button">▲</button>
                <button id="strokeDown" type="button">▼</button>
              </div>
            </div>
          </div>

          <label id="solidField" class="checkbox-row">
            <input id="solidInput" type="checkbox" />
            <span>Solid</span>
          </label>

          <div id="colourField" class="field">
            <div class="field-label">Colour</div>
            <div id="colourGrid" class="grid-5"></div>
          </div>

          <div id="backgroundRgbField" class="grid-3" style="display:none">
            <label class="field">
              <div class="field-label">R</div>
              <div class="stepper">
                <input id="bgR" type="number" min="0" max="255" />
                <div class="stepper-side">
                  <button id="bgRUp" type="button">▲</button>
                  <button id="bgRDown" type="button">▼</button>
                </div>
              </div>
            </label>
            <label class="field">
              <div class="field-label">G</div>
              <div class="stepper">
                <input id="bgG" type="number" min="0" max="255" />
                <div class="stepper-side">
                  <button id="bgGUp" type="button">▲</button>
                  <button id="bgGDown" type="button">▼</button>
                </div>
              </div>
            </label>
            <label class="field">
              <div class="field-label">B</div>
              <div class="stepper">
                <input id="bgB" type="number" min="0" max="255" />
                <div class="stepper-side">
                  <button id="bgBUp" type="button">▲</button>
                  <button id="bgBDown" type="button">▼</button>
                </div>
              </div>
            </label>
          </div>
        </div>

        <div style="margin-top:auto"></div>
        <div class="divider"></div>

        <div class="section">
          <div class="section-title">ACTIONS</div>
          <div class="grid-2">
            <button id="uploadBtn" class="btn">Upload</button>
            <button id="pasteBtn" class="btn">Paste</button>
          </div>
          <div class="grid-3">
            <button id="saveBtn" class="btn">Save</button>
            <button id="copyBtn" class="btn">Copy</button>
            <button id="clearBtn" class="btn danger">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <div id="confirmOverlay">
      <div class="dialog">
        <div class="dialog-title">Are you sure?</div>
        <div class="dialog-text">This will remove everything currently on the canvas.</div>
        <div class="dialog-actions">
          <button id="cancelClearBtn" class="btn">Cancel</button>
          <button id="confirmClearBtn" class="btn danger">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOOL = {
      BRUSH: "brush",
      LINE: "line",
      SHAPE: "shape",
      ARROW_ONE: "arrowOne",
      ARROW_TWO: "arrowTwo",
      TEXT: "text",
      BACKGROUND: "background",
    };

    const TOOL_ORDER = [
      "select",
      TOOL.BRUSH,
      TOOL.LINE,
      TOOL.SHAPE,
      TOOL.ARROW_ONE,
      TOOL.ARROW_TWO,
      TOOL.TEXT,
      TOOL.BACKGROUND,
    ];

    const TOOL_LABEL = {
      select: "Select",
      [TOOL.BRUSH]: "Brush",
      [TOOL.LINE]: "Line",
      [TOOL.SHAPE]: "Shape",
      [TOOL.ARROW_ONE]: "Arrow one-way",
      [TOOL.ARROW_TWO]: "Arrow two-way",
      [TOOL.TEXT]: "Text",
      [TOOL.BACKGROUND]: "Background",
    };

    const SHAPES = ["circle", "square", "rectangle", "triangle", "hexagon"];
    const COLOUR_SWATCHES = [
      "#000000", "#404040", "#808080", "#bfbfbf", "#ffffff",
      "#7f1d1d", "#b91c1c", "#ef4444", "#f87171", "#fecaca",
      "#7c2d12", "#c2410c", "#f97316", "#fb923c", "#fed7aa",
      "#78350f", "#d97706", "#f59e0b", "#fbbf24", "#fde68a",
      "#365314", "#65a30d", "#84cc16", "#a3e635", "#d9f99d",
      "#14532d", "#16a34a", "#22c55e", "#4ade80", "#bbf7d0",
      "#1e3a8a", "#2563eb", "#3b82f6", "#60a5fa", "#bfdbfe",
    ];

    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function clone(value) { return JSON.parse(JSON.stringify(value)); }
    function makeId(prefix = "item") { return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`; }
    function distance(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
    function rectFromPoints(a, b) { return { x: Math.min(a.x, b.x), y: Math.min(a.y, b.y), w: Math.abs(b.x - a.x), h: Math.abs(b.y - a.y) }; }
    function canvasPointFromEvent(event, canvas) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }
    function pointInRect(point, rect) {
      return point.x >= rect.x && point.x <= rect.x + rect.w && point.y >= rect.y && point.y <= rect.y + rect.h;
    }
    function midpoint(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }
    function getAlpha01(alpha) { return clamp(alpha ?? 100, 0, 100) / 100; }
    function rgbToHex(r, g, b) {
      const toHex = (v) => clamp(Number(v) || 0, 0, 255).toString(16).padStart(2, "0");
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function drawPolygonPath(ctx, cx, cy, rx, ry, sides, rotation = -Math.PI / 2) {
      ctx.beginPath();
      for (let i = 0; i < sides; i += 1) {
        const angle = rotation + (Math.PI * 2 * i) / sides;
        const x = cx + Math.cos(angle) * rx;
        const y = cy + Math.sin(angle) * ry;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function drawStamp(ctx, point, size, shape, color, alpha = 100) {
      const half = size / 2;
      ctx.save();
      ctx.fillStyle = color;
      ctx.globalAlpha = getAlpha01(alpha);
      if (shape === "circle") {
        ctx.beginPath();
        ctx.arc(point.x, point.y, Math.max(0.5, half), 0, Math.PI * 2);
        ctx.fill();
      } else if (shape === "square") {
        ctx.fillRect(point.x - half, point.y - half, size, size);
      } else if (shape === "rectangle") {
        ctx.fillRect(point.x - half, point.y - half * 0.65, size, size * 0.65);
      } else if (shape === "triangle") {
        ctx.beginPath();
        ctx.moveTo(point.x, point.y - half);
        ctx.lineTo(point.x + half, point.y + half);
        ctx.lineTo(point.x - half, point.y + half);
        ctx.closePath();
        ctx.fill();
      } else if (shape === "hexagon") {
        drawPolygonPath(ctx, point.x, point.y, half, half, 6);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBrush(ctx, object) {
      const points = object.points || [];
      if (!points.length) return;
      if (points.length === 1) {
        drawStamp(ctx, points[0], object.size, object.shape, object.color, object.alpha);
        return;
      }
      const spacing = Math.max(1, object.size * 0.18);
      for (let i = 0; i < points.length - 1; i += 1) {
        const start = points[i];
        const end = points[i + 1];
        const steps = Math.max(1, Math.ceil(distance(start, end) / spacing));
        for (let s = 0; s <= steps; s += 1) {
          const t = s / steps;
          drawStamp(ctx, { x: start.x + (end.x - start.x) * t, y: start.y + (end.y - start.y) * t }, object.size, object.shape, object.color, object.alpha);
        }
      }
    }

    function drawLine(ctx, object) {
      ctx.save();
      ctx.globalAlpha = getAlpha01(object.alpha);
      ctx.strokeStyle = object.color;
      ctx.lineWidth = object.size;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(object.start.x, object.start.y);
      ctx.lineTo(object.end.x, object.end.y);
      ctx.stroke();
      ctx.restore();
    }

    function getArrowHeadLength(size) { return Math.max(12, size * 3.5); }

    function drawArrowHead(ctx, from, to, size, color, alpha = 100) {
      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      const headLength = getArrowHeadLength(size);
      const spread = Math.PI / 7;
      ctx.save();
      ctx.globalAlpha = getAlpha01(alpha);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(to.x, to.y);
      ctx.lineTo(to.x - headLength * Math.cos(angle - spread), to.y - headLength * Math.sin(angle - spread));
      ctx.lineTo(to.x - headLength * Math.cos(angle + spread), to.y - headLength * Math.sin(angle + spread));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawArrow(ctx, object) {
      const dx = object.end.x - object.start.x;
      const dy = object.end.y - object.start.y;
      const length = Math.hypot(dx, dy);
      if (length === 0) {
        if (object.endHead) drawArrowHead(ctx, { x: object.start.x - 1, y: object.start.y }, object.end, object.size, object.color, object.alpha);
        return;
      }
      const unitX = dx / length;
      const unitY = dy / length;
      const headLength = getArrowHeadLength(object.size);
      const lineStart = object.startHead ? { x: object.start.x + unitX * headLength, y: object.start.y + unitY * headLength } : object.start;
      const lineEnd = object.endHead ? { x: object.end.x - unitX * headLength, y: object.end.y - unitY * headLength } : object.end;
      drawLine(ctx, { ...object, start: lineStart, end: lineEnd });
      if (object.startHead) drawArrowHead(ctx, object.end, object.start, object.size, object.color, object.alpha);
      if (object.endHead) drawArrowHead(ctx, object.start, object.end, object.size, object.color, object.alpha);
    }

    function drawShape(ctx, object) {
      const w = Math.max(1, object.w);
      const h = Math.max(1, object.h);
      const cx = object.x + w / 2;
      const cy = object.y + h / 2;
      ctx.save();
      ctx.globalAlpha = getAlpha01(object.alpha);
      ctx.lineWidth = object.stroke;
      ctx.strokeStyle = object.color;
      ctx.fillStyle = object.color;
      if (object.shape === "rectangle" || object.shape === "square") {
        if (object.solid) ctx.fillRect(object.x, object.y, w, h);
        if (object.stroke > 0) ctx.strokeRect(object.x, object.y, w, h);
      } else if (object.shape === "circle") {
        ctx.beginPath();
        ctx.ellipse(cx, cy, w / 2, h / 2, 0, 0, Math.PI * 2);
        if (object.solid) ctx.fill();
        if (object.stroke > 0) ctx.stroke();
      } else if (object.shape === "triangle") {
        ctx.beginPath();
        ctx.moveTo(cx, object.y);
        ctx.lineTo(object.x + w, object.y + h);
        ctx.lineTo(object.x, object.y + h);
        ctx.closePath();
        if (object.solid) ctx.fill();
        if (object.stroke > 0) ctx.stroke();
      } else if (object.shape === "hexagon") {
        drawPolygonPath(ctx, cx, cy, w / 2, h / 2, 6);
        if (object.solid) ctx.fill();
        if (object.stroke > 0) ctx.stroke();
      }
      ctx.restore();
    }

    function drawTextObject(ctx, object) {
      ctx.save();
      ctx.globalAlpha = getAlpha01(object.alpha);
      ctx.fillStyle = object.color;
      ctx.font = `${object.size}px sans-serif`;
      ctx.textBaseline = "top";
      const lines = String(object.text || "").split("\n");
      lines.forEach((line, index) => {
        ctx.fillText(line, object.x, object.y + index * object.size * 1.25);
      });
      ctx.restore();
    }

    function getTextBounds(object) {
      const lines = String(object.text || "").split("\n");
      const width = Math.max(...lines.map((line) => line.length), 1) * object.size * 0.62;
      const height = lines.length * object.size * 1.25;
      return { x: object.x, y: object.y, w: width, h: height };
    }

    function getBrushBounds(object) {
      const points = object.points || [];
      if (!points.length) return { x: 0, y: 0, w: 0, h: 0 };
      const xs = points.map((p) => p.x);
      const ys = points.map((p) => p.y);
      const half = (object.size || 1) / 2;
      return {
        x: Math.min(...xs) - half,
        y: Math.min(...ys) - half,
        w: Math.max(...xs) - Math.min(...xs) + object.size,
        h: Math.max(...ys) - Math.min(...ys) + object.size,
      };
    }

    function getLineBounds(object) {
      const minX = Math.min(object.start.x, object.end.x);
      const minY = Math.min(object.start.y, object.end.y);
      const maxX = Math.max(object.start.x, object.end.x);
      const maxY = Math.max(object.start.y, object.end.y);
      const pad = Math.max(8, object.size * 4);
      return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
    }

    function getObjectBounds(object) {
      if (object.type === "brush") return getBrushBounds(object);
      if (object.type === "shape") return { x: object.x, y: object.y, w: object.w, h: object.h };
      if (object.type === "image") return { x: object.x, y: object.y, w: object.width, h: object.height };
      if (object.type === "text") return getTextBounds(object);
      if (object.type === "line" || object.type === "arrow") return getLineBounds(object);
      return { x: 0, y: 0, w: 0, h: 0 };
    }

    function pointSegmentDistance(point, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (dx === 0 && dy === 0) return distance(point, a);
      const t = clamp(((point.x - a.x) * dx + (point.y - a.y) * dy) / (dx * dx + dy * dy), 0, 1);
      const proj = { x: a.x + dx * t, y: a.y + dy * t };
      return distance(point, proj);
    }

    function hitTestObject(object, point) {
      if (object.type === "line" || object.type === "arrow") return pointSegmentDistance(point, object.start, object.end) <= Math.max(10, object.size + 6);
      const bounds = getObjectBounds(object);
      return pointInRect(point, { x: bounds.x - 6, y: bounds.y - 6, w: bounds.w + 12, h: bounds.h + 12 });
    }

    function translateObject(object, dx, dy) {
      const next = clone(object);
      if (next.type === "brush") next.points = next.points.map((p) => ({ x: p.x + dx, y: p.y + dy }));
      else if (next.type === "shape" || next.type === "image" || next.type === "text") { next.x += dx; next.y += dy; }
      else if (next.type === "line" || next.type === "arrow") {
        next.start.x += dx; next.start.y += dy; next.end.x += dx; next.end.y += dy;
      }
      return next;
    }

    function updateSelectedObject(object, patch) {
      const next = clone(object);
      if (next.type === "brush") {
        if (typeof patch.size === "number") next.size = patch.size;
        if (patch.shape) next.shape = patch.shape;
        if (patch.color) next.color = patch.color;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
      } else if (next.type === "line" || next.type === "arrow") {
        if (typeof patch.size === "number") next.size = patch.size;
        if (patch.color) next.color = patch.color;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
      } else if (next.type === "shape") {
        if (typeof patch.size === "number") {
          const cx = next.x + next.w / 2;
          const cy = next.y + next.h / 2;
          next.w = patch.size; next.h = patch.size; next.x = cx - next.w / 2; next.y = cy - next.h / 2;
        }
        if (patch.shape) next.shape = patch.shape;
        if (patch.color) next.color = patch.color;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
        if (typeof patch.stroke === "number") next.stroke = patch.stroke;
        if (typeof patch.solid === "boolean") next.solid = patch.solid;
      } else if (next.type === "text") {
        if (typeof patch.size === "number") next.size = patch.size;
        if (patch.color) next.color = patch.color;
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
      } else if (next.type === "image") {
        if (typeof patch.alpha === "number") next.alpha = patch.alpha;
      }
      return next;
    }

    function getTwoTouchDistance(touchMap) {
      const values = Array.from(touchMap.values());
      if (values.length < 2) return 0;
      return distance(values[0], values[1]);
    }

    const state = {
      scene: { backgroundColor: "#ffffff", objects: [] },
      history: [],
      historyIndex: 0,
      activeTool: TOOL.BRUSH,
      selectMode: false,
      selectedId: null,
      interaction: null,
      draft: null,
      editingText: null,
      view: { scale: 1, offsetX: 0, offsetY: 0 },
      canvasSize: { width: 1200, height: 700 },
      touchMap: new Map(),
      pinchState: null,
      toolPrefs: {
        [TOOL.BRUSH]: { color: "#000000", size: 10, shape: "circle", alpha: 100 },
        [TOOL.LINE]: { color: "#000000", size: 4, alpha: 100 },
        [TOOL.SHAPE]: { color: "#000000", size: 90, shape: "rectangle", stroke: 3, solid: true, alpha: 100 },
        [TOOL.ARROW_ONE]: { color: "#000000", size: 4, alpha: 100 },
        [TOOL.ARROW_TWO]: { color: "#000000", size: 4, alpha: 100 },
        [TOOL.TEXT]: { color: "#000000", size: 28, alpha: 100 },
        [TOOL.BACKGROUND]: { color: "#ffffff" },
        image: { scalePercent: 100, alpha: 100 },
      },
      imageCache: {},
    };

    const $ = (id) => document.getElementById(id);
    const canvas = $("canvas");
    const viewport = $("viewport");
    const fileInput = $("fileInput");
    const textEditor = $("textEditor");
    const confirmOverlay = $("confirmOverlay");
    const ctx = canvas.getContext("2d");

    function selectedObject() { return state.scene.objects.find((obj) => obj.id === state.selectedId) || null; }
    function activePrefs() { return state.activeTool ? state.toolPrefs[state.activeTool] || {} : {}; }
    function targetType() {
      const sel = selectedObject();
      if (sel) return sel.type;
      if (state.activeTool === TOOL.ARROW_ONE || state.activeTool === TOOL.ARROW_TWO) return "arrow";
      return state.activeTool;
    }

    function pushHistory(scene) {
      const cloned = clone(scene);
      state.history = state.history.slice(0, state.historyIndex + 1);
      state.history.push(cloned);
      state.historyIndex = state.history.length - 1;
      state.scene = cloned;
      renderAll();
    }

    function initHistory() { state.history = [clone(state.scene)]; state.historyIndex = 0; }

    function screenToWorld(point) {
      return { x: (point.x - state.view.offsetX) / state.view.scale, y: (point.y - state.view.offsetY) / state.view.scale };
    }
    function worldToScreen(point) {
      return { x: point.x * state.view.scale + state.view.offsetX, y: point.y * state.view.scale + state.view.offsetY };
    }
    function zoomAt(screenPoint, nextScale) {
      const scale = clamp(nextScale, 0.25, 6);
      const worldPoint = screenToWorld(screenPoint);
      state.view = { scale, offsetX: screenPoint.x - worldPoint.x * scale, offsetY: screenPoint.y - worldPoint.y * scale };
      renderAll();
    }

    function updateCanvasSize() {
      const rect = viewport.getBoundingClientRect();
      state.canvasSize = { width: Math.max(320, Math.floor(rect.width)), height: Math.max(220, Math.floor(rect.height)) };
      const dpr = window.devicePixelRatio || 1;
      canvas.width = state.canvasSize.width * dpr;
      canvas.height = state.canvasSize.height * dpr;
      canvas.style.width = `${state.canvasSize.width}px`;
      canvas.style.height = `${state.canvasSize.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      renderAll();
    }

    function ensureImageCached(dataUrl, onLoad) {
      const cached = state.imageCache[dataUrl];
      if (cached) return cached;
      const img = new Image();
      state.imageCache[dataUrl] = { img, loaded: false };
      img.onload = () => {
        state.imageCache[dataUrl] = { img, loaded: true };
        if (onLoad) onLoad();
      };
      img.src = dataUrl;
      return state.imageCache[dataUrl];
    }

    function drawScene(targetCtx, scene, options = {}) {
      const backgroundRect = options.backgroundRect || { x: 0, y: 0, w: state.canvasSize.width, h: state.canvasSize.height };
      targetCtx.clearRect(0, 0, state.canvasSize.width, state.canvasSize.height);
      targetCtx.fillStyle = scene.backgroundColor;
      targetCtx.fillRect(backgroundRect.x, backgroundRect.y, backgroundRect.w, backgroundRect.h);
      for (const object of scene.objects) {
        if (object.type === "brush") drawBrush(targetCtx, object);
        if (object.type === "line") drawLine(targetCtx, object);
        if (object.type === "arrow") drawArrow(targetCtx, object);
        if (object.type === "shape") drawShape(targetCtx, object);
        if (object.type === "text") drawTextObject(targetCtx, object);
        if (object.type === "image") {
          const cached = ensureImageCached(object.dataUrl, renderAll);
          if (cached.loaded) {
            targetCtx.save();
            targetCtx.globalAlpha = getAlpha01(object.alpha);
            targetCtx.drawImage(cached.img, object.x, object.y, object.width, object.height);
            targetCtx.restore();
          }
        }
      }
      if (options.preview) {
        const preview = options.preview;
        if (preview.type === "brush") drawBrush(targetCtx, preview);
        if (preview.type === "line") drawLine(targetCtx, preview);
        if (preview.type === "arrow") drawArrow(targetCtx, preview);
        if (preview.type === "shape") drawShape(targetCtx, preview);
      }
      if (options.selectedId) {
        const selected = scene.objects.find((obj) => obj.id === options.selectedId);
        if (selected) {
          const bounds = getObjectBounds(selected);
          targetCtx.save();
          targetCtx.strokeStyle = "#111111";
          targetCtx.lineWidth = 2;
          targetCtx.setLineDash([8, 6]);
          targetCtx.strokeRect(bounds.x - 6, bounds.y - 6, bounds.w + 12, bounds.h + 12);
          targetCtx.restore();
        }
      }
    }

    function renderCanvas() {
      const backgroundRect = {
        x: -state.view.offsetX / state.view.scale,
        y: -state.view.offsetY / state.view.scale,
        w: state.canvasSize.width / state.view.scale,
        h: state.canvasSize.height / state.view.scale,
      };
      ctx.clearRect(0, 0, state.canvasSize.width, state.canvasSize.height);
      ctx.save();
      ctx.translate(state.view.offsetX, state.view.offsetY);
      ctx.scale(state.view.scale, state.view.scale);
      drawScene(ctx, state.scene, { preview: state.draft, selectedId: state.selectedId, backgroundRect });
      ctx.restore();
    }

    function renderTextEditor() {
      if (!state.editingText) { textEditor.style.display = "none"; return; }
      const screen = worldToScreen({ x: state.editingText.x, y: state.editingText.y });
      textEditor.style.display = "block";
      textEditor.style.left = `${screen.x}px`;
      textEditor.style.top = `${screen.y}px`;
      textEditor.style.minHeight = `${state.editingText.size * state.view.scale * 1.2}px`;
      textEditor.style.fontSize = `${state.editingText.size * state.view.scale}px`;
      textEditor.style.color = state.editingText.color;
      textEditor.style.opacity = `${state.editingText.alpha / 100}`;
      if (textEditor.value !== state.editingText.text) textEditor.value = state.editingText.text;
    }

    function renderTools() {
      const grid = $("toolsGrid");
      grid.innerHTML = "";
      for (const tool of TOOL_ORDER) {
        const btn = document.createElement("button");
        btn.className = "tool-btn";
        const active = tool === "select" ? state.selectMode : state.activeTool === tool;
        if (active) btn.classList.add("active");
        btn.textContent = TOOL_LABEL[tool];
        btn.addEventListener("click", () => toggleTool(tool));
        grid.appendChild(btn);
      }
    }

    function renderShapes() {
      const grid = $("shapeGrid");
      grid.innerHTML = "";
      const sel = selectedObject();
      const currentShape = sel ? sel.shape : activePrefs().shape;
      for (const shape of SHAPES) {
        const btn = document.createElement("button");
        btn.className = "btn";
        if (currentShape === shape) btn.classList.add("active");
        btn.style.minHeight = "26px";
        btn.style.fontSize = "10px";
        btn.textContent = shape;
        btn.addEventListener("click", () => applyAttributesPatch({ shape }));
        grid.appendChild(btn);
      }
    }

    function renderColours() {
      const grid = $("colourGrid");
      grid.innerHTML = "";
      const sel = selectedObject();
      const currentColour = sel ? sel.color : state.activeTool === TOOL.BACKGROUND ? state.scene.backgroundColor : activePrefs().color;
      for (const swatch of COLOUR_SWATCHES) {
        const btn = document.createElement("button");
        btn.className = "swatch";
        if (currentColour === swatch) btn.classList.add("active");
        btn.style.background = swatch;
        btn.addEventListener("click", () => applyAttributesPatch({ color: swatch }));
        grid.appendChild(btn);
      }
    }

    function renderAttributes() {
      const type = targetType();
      const sel = selectedObject();
      const prefs = activePrefs();
      const supportsSize = ["brush", "line", "shape", "arrow", "text", "image"].includes(type);
      const supportsShape = ["brush", "shape"].includes(type);
      const supportsAlpha = ["brush", "line", "shape", "arrow", "text", "image"].includes(type);
      const supportsColour = ["brush", "line", "shape", "arrow", "text", TOOL.BACKGROUND].includes(type);
      const supportsStrokeSolid = type === "shape";
      $("attributesSection").style.display = (supportsSize || supportsShape || supportsAlpha || supportsColour || supportsStrokeSolid) ? "flex" : "none";
      $("sizeField").style.display = supportsSize ? "flex" : "none";
      $("shapeField").style.display = supportsShape ? "flex" : "none";
      $("alphaField").style.display = supportsAlpha ? "flex" : "none";
      $("strokeField").style.display = supportsStrokeSolid ? "flex" : "none";
      $("solidField").style.display = supportsStrokeSolid ? "flex" : "none";
      $("colourField").style.display = supportsColour ? "flex" : "none";
      $("backgroundRgbField").style.display = state.activeTool === TOOL.BACKGROUND && !sel ? "grid" : "none";

      const currentSize = sel?.type === "image" ? state.toolPrefs.image.scalePercent : sel?.size ?? prefs.size ?? 1;
      const currentAlpha = sel ? (sel.alpha ?? 100) : (prefs.alpha ?? 100);
      const currentStroke = sel?.stroke ?? prefs.stroke ?? 3;
      const currentSolid = sel?.solid ?? prefs.solid ?? true;
      const backgroundRgb = {
        r: parseInt(state.scene.backgroundColor.slice(1, 3), 16),
        g: parseInt(state.scene.backgroundColor.slice(3, 5), 16),
        b: parseInt(state.scene.backgroundColor.slice(5, 7), 16),
      };
      $("sizeInput").value = currentSize;
      $("alphaInput").value = currentAlpha;
      $("alphaValue").textContent = String(currentAlpha);
      $("strokeInput").value = currentStroke;
      $("solidInput").checked = !!currentSolid;
      $("bgR").value = backgroundRgb.r;
      $("bgG").value = backgroundRgb.g;
      $("bgB").value = backgroundRgb.b;
      if (supportsShape) renderShapes();
      if (supportsColour) renderColours();
    }

    function renderAll() { renderTools(); renderAttributes(); renderCanvas(); renderTextEditor(); }

    function updateToolPreference(tool, patch) {
      state.toolPrefs[tool] = { ...(state.toolPrefs[tool] || {}), ...patch };
    }

    function applyAttributesPatch(patch) {
      const sel = selectedObject();
      if (sel) {
        const nextScene = clone(state.scene);
        const index = nextScene.objects.findIndex((obj) => obj.id === state.selectedId);
        if (index === -1) return;
        nextScene.objects[index] = updateSelectedObject(nextScene.objects[index], patch);
        pushHistory(nextScene);
        return;
      }
      if (state.activeTool === TOOL.BACKGROUND && patch.color) {
        const nextScene = clone(state.scene);
        nextScene.backgroundColor = patch.color;
        updateToolPreference(TOOL.BACKGROUND, { color: patch.color });
        pushHistory(nextScene);
        return;
      }
      if (state.activeTool) {
        updateToolPreference(state.activeTool, patch);
        renderAll();
      }
    }

    function startTextAt(worldPoint) {
      state.editingText = {
        x: worldPoint.x,
        y: worldPoint.y,
        text: "",
        size: state.toolPrefs[TOOL.TEXT].size,
        color: state.toolPrefs[TOOL.TEXT].color,
        alpha: state.toolPrefs[TOOL.TEXT].alpha,
      };
      renderTextEditor();
      requestAnimationFrame(() => textEditor.focus());
      setTimeout(() => textEditor.focus(), 0);
    }

    function commitEditingText() {
      if (!state.editingText || !state.editingText.text.trim()) {
        state.editingText = null;
        renderTextEditor();
        return;
      }
      const nextScene = clone(state.scene);
      const newTextObject = {
        id: makeId("text"), type: "text", x: state.editingText.x, y: state.editingText.y,
        text: state.editingText.text, size: state.editingText.size, color: state.editingText.color, alpha: state.editingText.alpha,
      };
      nextScene.objects.push(newTextObject);
      pushHistory(nextScene);
      state.selectedId = newTextObject.id;
      state.editingText = null;
      renderAll();
    }

    function toggleTool(tool) {
      if (state.activeTool === TOOL.TEXT && state.editingText) commitEditingText();
      if (tool === "select") {
        const next = !state.selectMode;
        state.selectMode = next;
        state.activeTool = null;
        state.draft = null;
        state.interaction = null;
        if (!next) state.selectedId = null;
        renderAll();
        return;
      }
      const nextTool = state.activeTool === tool ? null : tool;
      state.activeTool = nextTool;
      state.selectMode = false;
      state.draft = null;
      state.interaction = null;
      state.selectedId = null;
      renderAll();
    }

    function clearCanvasNow() {
      updateToolPreference(TOOL.BACKGROUND, { color: "#ffffff" });
      state.scene = { backgroundColor: "#ffffff", objects: [] };
      initHistory();
      state.selectedId = null;
      state.draft = null;
      state.interaction = null;
      state.editingText = null;
      state.view = { scale: 1, offsetX: 0, offsetY: 0 };
      confirmOverlay.classList.remove("show");
      renderAll();
    }

    function addImage(dataUrl) {
      const img = new Image();
      img.onload = () => {
        const maxW = state.canvasSize.width * 0.5 / state.view.scale;
        const maxH = state.canvasSize.height * 0.4 / state.view.scale;
        const scale = Math.min(maxW / img.width, maxH / img.height, 1);
        const width = Math.max(40, img.width * scale);
        const height = Math.max(40, img.height * scale);
        const center = screenToWorld({ x: state.canvasSize.width / 2, y: state.canvasSize.height / 2 });
        const nextScene = clone(state.scene);
        const object = { id: makeId("img"), type: "image", dataUrl, x: center.x - width / 2, y: center.y - height / 2, width, height, alpha: 100 };
        nextScene.objects.push(object);
        pushHistory(nextScene);
        state.selectedId = object.id;
        state.toolPrefs.image = { ...state.toolPrefs.image, scalePercent: 100, alpha: 100 };
        renderAll();
      };
      img.src = dataUrl;
    }

    function handleImageUpload(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => addImage(reader.result);
      reader.readAsDataURL(file);
      event.target.value = "";
    }

    async function pasteImageFromClipboard() {
      if (!navigator.clipboard?.read) return;
      try {
        const items = await navigator.clipboard.read();
        const imageItem = items.find((item) => item.types.some((type) => type.startsWith("image/")));
        if (!imageItem) return;
        const imageType = imageItem.types.find((type) => type.startsWith("image/"));
        const blob = await imageItem.getType(imageType);
        const reader = new FileReader();
        reader.onload = () => addImage(reader.result);
        reader.readAsDataURL(blob);
      } catch {
        // ignore clipboard failure
      }
    }

    function resizeSelectedImage(percent) {
      const sel = selectedObject();
      if (!sel || sel.type !== "image") return;
      const currentPercent = state.toolPrefs.image.scalePercent || 100;
      const ratio = percent / currentPercent;
      const nextScene = clone(state.scene);
      const target = nextScene.objects.find((obj) => obj.id === state.selectedId);
      if (!target) return;
      const cx = target.x + target.width / 2;
      const cy = target.y + target.height / 2;
      target.width = Math.max(20, target.width * ratio);
      target.height = Math.max(20, target.height * ratio);
      target.x = cx - target.width / 2;
      target.y = cy - target.height / 2;
      state.toolPrefs.image = { ...state.toolPrefs.image, scalePercent: percent };
      pushHistory(nextScene);
    }

    function buildShapeObject(start, end) {
      const prefs = activePrefs();
      const usePreset = distance(start, end) < 4;
      let rect;
      if (usePreset) {
        const size = prefs.size || 90;
        rect = { x: start.x - size / 2, y: start.y - size / 2, w: size, h: size };
      } else {
        rect = rectFromPoints(start, end);
        if (["circle", "square", "hexagon"].includes(prefs.shape)) {
          const side = Math.max(rect.w, rect.h);
          rect.w = side; rect.h = side;
        }
      }
      return {
        id: makeId("shape"), type: "shape", x: rect.x, y: rect.y, w: rect.w, h: rect.h,
        shape: prefs.shape, color: prefs.color, stroke: prefs.stroke || 3, solid: prefs.solid ?? true, alpha: prefs.alpha ?? 100,
      };
    }

    function renderExportCanvas() {
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = state.canvasSize.width;
      exportCanvas.height = state.canvasSize.height;
      const exportCtx = exportCanvas.getContext("2d");
      const exportScene = clone(state.scene);
      if (state.editingText && state.editingText.text.trim()) {
        exportScene.objects.push({
          id: "text_preview_export", type: "text", x: state.editingText.x, y: state.editingText.y,
          text: state.editingText.text, size: state.editingText.size, color: state.editingText.color, alpha: state.editingText.alpha,
        });
      }
      const backgroundRect = {
        x: -state.view.offsetX / state.view.scale,
        y: -state.view.offsetY / state.view.scale,
        w: state.canvasSize.width / state.view.scale,
        h: state.canvasSize.height / state.view.scale,
      };
      exportCtx.save();
      exportCtx.translate(state.view.offsetX, state.view.offsetY);
      exportCtx.scale(state.view.scale, state.view.scale);
      drawScene(exportCtx, exportScene, { backgroundRect });
      exportCtx.restore();
      return exportCanvas;
    }

    function saveCanvas() {
      try {
        const exportCanvas = renderExportCanvas();
        const url = exportCanvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = url;
        link.download = `eek-a-sketch_${new Date().toISOString().replace(/[:.]/g, "-")}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
      } catch {
        // ignore
      }
    }

    async function copyCanvas() {
      try {
        const exportCanvas = renderExportCanvas();
        const blob = await new Promise((resolve) => exportCanvas.toBlob(resolve, "image/png"));
        if (!blob || !navigator.clipboard?.write || !window.ClipboardItem) return;
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
      } catch {
        // ignore
      }
    }

    function onPointerDown(event) {
      state.touchMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (state.touchMap.size >= 2) {
        state.pinchState = {
          startDistance: getTwoTouchDistance(state.touchMap),
          startScale: state.view.scale,
          startOffsetX: state.view.offsetX,
          startOffsetY: state.view.offsetY,
        };
        state.interaction = { kind: "pinchPan" };
        return;
      }

      const screenPoint = canvasPointFromEvent(event, canvas);
      const worldPoint = screenToWorld(screenPoint);

      if (state.activeTool === TOOL.TEXT) {
        if (!state.editingText) startTextAt(worldPoint);
        else textEditor.focus();
        return;
      }

      if (state.editingText) commitEditingText();

      if (state.selectMode) {
        const hit = [...state.scene.objects].reverse().find((obj) => hitTestObject(obj, worldPoint)) || null;
        if (hit) {
          state.selectedId = hit.id;
          state.interaction = { kind: "selectMove", id: hit.id, startWorld: worldPoint, baseScene: clone(state.scene) };
          canvas.setPointerCapture?.(event.pointerId);
        } else {
          state.selectedId = null;
          state.interaction = { kind: "pan", startScreen: screenPoint, startOffsetX: state.view.offsetX, startOffsetY: state.view.offsetY };
          canvas.setPointerCapture?.(event.pointerId);
        }
        renderAll();
        return;
      }

      const prefs = activePrefs();
      if (state.activeTool === TOOL.BRUSH) {
        const points = [worldPoint];
        state.interaction = { kind: "brush", points };
        state.draft = { type: "brush", points, size: prefs.size, shape: prefs.shape, color: prefs.color, alpha: prefs.alpha };
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }
      if (state.activeTool === TOOL.SHAPE) {
        state.interaction = { kind: "shape", start: worldPoint };
        state.draft = buildShapeObject(worldPoint, worldPoint);
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }
      if (state.activeTool === TOOL.LINE || state.activeTool === TOOL.ARROW_ONE || state.activeTool === TOOL.ARROW_TWO) {
        state.interaction = { kind: "dragLine", start: worldPoint, tool: state.activeTool };
        state.draft = state.activeTool === TOOL.LINE
          ? { type: "line", start: worldPoint, end: worldPoint, color: prefs.color, size: prefs.size, alpha: prefs.alpha }
          : {
              type: "arrow", start: worldPoint, end: worldPoint, color: prefs.color, size: prefs.size, alpha: prefs.alpha,
              startHead: state.activeTool === TOOL.ARROW_TWO, endHead: true,
            };
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }

      state.interaction = { kind: "pan", startScreen: screenPoint, startOffsetX: state.view.offsetX, startOffsetY: state.view.offsetY };
      canvas.setPointerCapture?.(event.pointerId);
    }

    function onPointerMove(event) {
      if (!state.interaction) return;
      if (state.touchMap.has(event.pointerId)) state.touchMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (state.interaction.kind === "pinchPan" && state.pinchState && state.touchMap.size >= 2) {
        const currentDistance = getTwoTouchDistance(state.touchMap);
        const values = Array.from(state.touchMap.values());
        const centerClient = midpoint(values[0], values[1]);
        const rect = canvas.getBoundingClientRect();
        const screenCenter = { x: centerClient.x - rect.left, y: centerClient.y - rect.top };
        const newScale = clamp(state.pinchState.startScale * (currentDistance / Math.max(1, state.pinchState.startDistance)), 0.25, 6);
        const worldAtCenter = {
          x: (screenCenter.x - state.pinchState.startOffsetX) / state.pinchState.startScale,
          y: (screenCenter.y - state.pinchState.startOffsetY) / state.pinchState.startScale,
        };
        state.view = {
          scale: newScale,
          offsetX: screenCenter.x - worldAtCenter.x * newScale,
          offsetY: screenCenter.y - worldAtCenter.y * newScale,
        };
        renderAll();
        return;
      }

      const screenPoint = canvasPointFromEvent(event, canvas);
      const worldPoint = screenToWorld(screenPoint);

      if (state.interaction.kind === "pan") {
        state.view = {
          ...state.view,
          offsetX: state.interaction.startOffsetX + (screenPoint.x - state.interaction.startScreen.x),
          offsetY: state.interaction.startOffsetY + (screenPoint.y - state.interaction.startScreen.y),
        };
        renderAll();
        return;
      }
      if (state.interaction.kind === "selectMove") {
        const dx = worldPoint.x - state.interaction.startWorld.x;
        const dy = worldPoint.y - state.interaction.startWorld.y;
        const nextScene = clone(state.interaction.baseScene);
        const index = nextScene.objects.findIndex((obj) => obj.id === state.interaction.id);
        if (index !== -1) {
          nextScene.objects[index] = translateObject(nextScene.objects[index], dx, dy);
          state.scene = nextScene;
          renderAll();
        }
        return;
      }

      const prefs = activePrefs();
      if (state.interaction.kind === "brush") {
        state.interaction.points = [...state.interaction.points, worldPoint];
        state.draft = { type: "brush", points: state.interaction.points, size: prefs.size, shape: prefs.shape, color: prefs.color, alpha: prefs.alpha };
        renderCanvas();
        return;
      }
      if (state.interaction.kind === "shape") {
        state.draft = buildShapeObject(state.interaction.start, worldPoint);
        renderCanvas();
        return;
      }
      if (state.interaction.kind === "dragLine") {
        state.draft = state.interaction.tool === TOOL.LINE
          ? { type: "line", start: state.interaction.start, end: worldPoint, color: prefs.color, size: prefs.size, alpha: prefs.alpha }
          : { type: "arrow", start: state.interaction.start, end: worldPoint, color: prefs.color, size: prefs.size, alpha: prefs.alpha, startHead: state.interaction.tool === TOOL.ARROW_TWO, endHead: true };
        renderCanvas();
      }
    }

    function onPointerUp(event) {
      state.touchMap.delete(event.pointerId);
      if (state.touchMap.size < 2) state.pinchState = null;
      if (!state.interaction || state.interaction.kind === "pinchPan") { state.interaction = null; return; }

      const screenPoint = canvasPointFromEvent(event, canvas);
      const worldPoint = screenToWorld(screenPoint);
      const prefs = activePrefs();

      if (state.interaction.kind === "pan") {
        state.interaction = null;
        canvas.releasePointerCapture?.(event.pointerId);
        return;
      }
      if (state.interaction.kind === "selectMove") {
        pushHistory(clone(state.scene));
        state.interaction = null;
        canvas.releasePointerCapture?.(event.pointerId);
        return;
      }
      if (state.interaction.kind === "brush") {
        const nextScene = clone(state.scene);
        const newBrush = { id: makeId("brush"), type: "brush", points: state.interaction.points.length ? state.interaction.points : [worldPoint], size: prefs.size, shape: prefs.shape, color: prefs.color, alpha: prefs.alpha };
        nextScene.objects.push(newBrush);
        pushHistory(nextScene);
        state.selectedId = newBrush.id;
        state.interaction = null;
        state.draft = null;
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
        return;
      }
      if (state.interaction.kind === "shape") {
        const nextScene = clone(state.scene);
        const newShape = buildShapeObject(state.interaction.start, worldPoint);
        nextScene.objects.push(newShape);
        pushHistory(nextScene);
        state.selectedId = newShape.id;
        state.interaction = null;
        state.draft = null;
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
        return;
      }
      if (state.interaction.kind === "dragLine") {
        const nextScene = clone(state.scene);
        const object = state.interaction.tool === TOOL.LINE
          ? { id: makeId("line"), type: "line", start: state.interaction.start, end: worldPoint, color: prefs.color, size: prefs.size, alpha: prefs.alpha }
          : { id: makeId("arrow"), type: "arrow", start: state.interaction.start, end: worldPoint, color: prefs.color, size: prefs.size, alpha: prefs.alpha, startHead: state.interaction.tool === TOOL.ARROW_TWO, endHead: true };
        nextScene.objects.push(object);
        pushHistory(nextScene);
        state.selectedId = object.id;
        state.interaction = null;
        state.draft = null;
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
      }
    }

    textEditor.addEventListener("input", () => {
      if (state.editingText) state.editingText.text = textEditor.value;
    });
    textEditor.addEventListener("blur", () => {
      if (state.activeTool === TOOL.TEXT) {
        setTimeout(() => {
          if (state.activeTool === TOOL.TEXT && state.editingText) textEditor.focus();
        }, 0);
      } else if (state.editingText) {
        commitEditingText();
      }
    });

    $("undoBtn").addEventListener("click", () => {
      if (state.historyIndex === 0) return;
      state.historyIndex -= 1;
      state.scene = clone(state.history[state.historyIndex]);
      state.draft = null; state.interaction = null; state.editingText = null; state.selectedId = null;
      renderAll();
    });
    $("redoBtn").addEventListener("click", () => {
      if (state.historyIndex >= state.history.length - 1) return;
      state.historyIndex += 1;
      state.scene = clone(state.history[state.historyIndex]);
      state.draft = null; state.interaction = null; state.editingText = null; state.selectedId = null;
      renderAll();
    });
    $("uploadBtn").addEventListener("click", () => fileInput.click());
    $("pasteBtn").addEventListener("click", pasteImageFromClipboard);
    $("saveBtn").addEventListener("click", saveCanvas);
    $("copyBtn").addEventListener("click", copyCanvas);
    $("clearBtn").addEventListener("click", () => confirmOverlay.classList.add("show"));
    $("cancelClearBtn").addEventListener("click", () => confirmOverlay.classList.remove("show"));
    $("confirmClearBtn").addEventListener("click", clearCanvasNow);
    fileInput.addEventListener("change", handleImageUpload);

    function bindStepper(inputId, upId, downId, min, max, apply) {
      const input = $(inputId), up = $(upId), down = $(downId);
      input.addEventListener("change", () => apply(clamp(Number(input.value) || 0, min, max)));
      up.addEventListener("click", () => apply(clamp((Number(input.value) || 0) + 1, min, max)));
      down.addEventListener("click", () => apply(clamp((Number(input.value) || 0) - 1, min, max)));
    }

    bindStepper("sizeInput", "sizeUp", "sizeDown", 1, 300, (value) => {
      const sel = selectedObject();
      if (sel && sel.type === "image") resizeSelectedImage(value);
      else applyAttributesPatch({ size: value });
    });
    bindStepper("strokeInput", "strokeUp", "strokeDown", 0, 60, (value) => applyAttributesPatch({ stroke: value }));
    bindStepper("bgR", "bgRUp", "bgRDown", 0, 255, (value) => applyAttributesPatch({ color: rgbToHex(value, Number($("bgG").value), Number($("bgB").value)) }));
    bindStepper("bgG", "bgGUp", "bgGDown", 0, 255, (value) => applyAttributesPatch({ color: rgbToHex(Number($("bgR").value), value, Number($("bgB").value)) }));
    bindStepper("bgB", "bgBUp", "bgBDown", 0, 255, (value) => applyAttributesPatch({ color: rgbToHex(Number($("bgR").value), Number($("bgG").value), value) }));

    $("alphaInput").addEventListener("input", (e) => applyAttributesPatch({ alpha: Number(e.target.value) }));
    $("solidInput").addEventListener("change", (e) => applyAttributesPatch({ solid: e.target.checked }));

    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointerleave", onPointerUp);
    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const point = { x: event.clientX - rect.left, y: event.clientY - rect.top };
      const factor = event.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomAt(point, state.view.scale * factor);
    }, { passive: false });

    window.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
        event.preventDefault();
        if (event.shiftKey) $("redoBtn").click(); else $("undoBtn").click();
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") {
        event.preventDefault();
        $("redoBtn").click();
      }
      if (event.key === "Escape") {
        if (state.activeTool === TOOL.TEXT && state.editingText) commitEditingText();
        else {
          state.editingText = null;
          state.draft = null;
          state.interaction = null;
          renderAll();
        }
      }
    });

    window.addEventListener("paste", (event) => {
      const items = event.clipboardData?.items || [];
      const imageItem = [...items].find((item) => item.type.startsWith("image/"));
      if (!imageItem) return;
      event.preventDefault();
      const file = imageItem.getAsFile();
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => addImage(reader.result);
      reader.readAsDataURL(file);
    });

    initHistory();
    updateCanvasSize();
    window.addEventListener("resize", updateCanvasSize);
    renderAll();
  </script>
</body>
</html>
