        if (!blob || !navigator.clipboard?.write || !window.ClipboardItem) return;
        await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
        state.lastClipboardSource = "image";
      } catch {
        // ignore
      }
    }

    async function pasteLatestClipboard() {
      if (state.lastClipboardSource === "elements" && state.elementClipboard?.length) {
        pasteClipboardElements();
        return true;
      }
      if (await pasteImageFromClipboard()) return true;
      if (state.elementClipboard?.length) {
        pasteClipboardElements();
        return true;
      }
      return false;
    }

    function isAdditiveSelection(event) {
      return state.multiSelectMode || event.ctrlKey || event.metaKey;
    }

    function maybeStartLongPressLineMenu() {
      return null;
    }

    function clearLongPressTimer(interaction) {
      if (interaction?.longPressTimer) {
        window.clearTimeout(interaction.longPressTimer);
        interaction.longPressTimer = null;
      }
    }

    function groupSelection() {
      if (state.selectedIds.length < 2) return;
      const nextScene = clone(state.scene);
      const groupId = makeId("group");
      const selectedSet = new Set(state.selectedIds);
      nextScene.objects = nextScene.objects.map((object) => selectedSet.has(object.id) ? { ...object, groupId } : object);
      pushHistory(nextScene, { label: "Group elements" });
      renderAll();
    }

    function buildCutPreview(start, end) {
      const rect = rectFromPoints(start, end);
      return normalizeShapeObject({
        id: "cut_preview",
        type: "shape",
        x: rect.x,
        y: rect.y,
        w: rect.w,
        h: rect.h,
        shape: "rectangle",
        fillColor: "#94a3b8",
        strokeColor: "#111111",
        stroke: 2,
        alpha: 20,
      });
    }

    function performCutRect(start, end) {
      const rect = rectFromPoints(start, end);
      if (rect.w < 2 || rect.h < 2) return;
      const screenA = worldToScreen({ x: rect.x, y: rect.y });
      const screenB = worldToScreen({ x: rect.x + rect.w, y: rect.y + rect.h });
      const sx = Math.max(0, Math.round(Math.min(screenA.x, screenB.x)));
      const sy = Math.max(0, Math.round(Math.min(screenA.y, screenB.y)));
      const sw = Math.max(1, Math.round(Math.abs(screenB.x - screenA.x)));
      const sh = Math.max(1, Math.round(Math.abs(screenB.y - screenA.y)));
      const rendered = renderExportCanvas();
      const cropCanvas = document.createElement("canvas");
      cropCanvas.width = sw;
      cropCanvas.height = sh;
      const cropCtx = cropCanvas.getContext("2d");
      cropCtx.drawImage(rendered, sx, sy, sw, sh, 0, 0, sw, sh);
      const dataUrl = cropCanvas.toDataURL("image/png");

      const nextScene = clone(state.scene);
      nextScene.objects.push(normalizeShapeObject({
        id: makeId("shape"),
        type: "shape",
        x: rect.x,
        y: rect.y,
        w: rect.w,
        h: rect.h,
        shape: "rectangle",
        fillColor: nextScene.backgroundColor,
        strokeColor: nextScene.backgroundColor,
        stroke: 0,
        alpha: 100,
      }));
      const imageObject = {
        id: makeId("img"),
        type: "image",
        dataUrl,
        x: rect.x,
        y: rect.y,
        width: rect.w,
        height: rect.h,
        alpha: 100,
      };
      nextScene.objects.push(imageObject);
      pushHistory(nextScene, { label: "Cut area" });
      setSelection([imageObject.id]);
      renderAll();
    }

    function beginSelectionInteraction(event, hitObject, screenPoint, worldPoint) {
      const additive = isAdditiveSelection(event);
      const hitIds = getSelectableIdsForObject(hitObject);
      const selectionBefore = [...state.selectedIds];
      const hitWasAlreadySelected = selectionBefore.includes(hitObject.id);
      const allSelected = hitIds.every((id) => state.selectedIds.includes(id));
      let moveIds = hitIds;
      if (additive) {
        if (allSelected) removeFromSelection(hitIds);
        else addToSelection(hitIds);
      } else if (hitWasAlreadySelected && selectionBefore.length) {
        setSelection(selectionBefore);
        moveIds = selectionBefore;
      } else {
        setSelection(hitIds);
      }
      const activeAfterSelection = moveIds.every((id) => state.selectedIds.includes(id));
      state.interaction = {
        kind: "selectHold",
        startWorld: worldPoint,
        startScreen: screenPoint,
        baseScene: clone(state.scene),
        hitId: hitObject.id,
        moveIds: [...moveIds],
        canMove: activeAfterSelection,
        longPressTimer: null,
      };
      canvas.setPointerCapture?.(event.pointerId);
      renderAll();
    }

    function onPointerDown(event) {
      state.touchMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (state.touchMap.size >= 2) {
        state.pinchState = {
          startDistance: getTwoTouchDistance(state.touchMap),
          startScale: state.view.scale,
          startOffsetX: state.view.offsetX,
          startOffsetY: state.view.offsetY,
        };
        state.interaction = { kind: "pinchPan" };
        return;
      }

      const screenPoint = canvasPointFromEvent(event, canvas);
      const worldPoint = screenToWorld(screenPoint);

      if (state.activeTool === TOOL.TEXT) {
        if (!state.editingText) startTextAt(worldPoint);
        else textEditor.focus();
        return;
      }

      if (state.editingText) commitEditingText();

      if (state.selectMode) {
        const hit = [...state.scene.objects].reverse().find((object) => hitTestObject(object, worldPoint)) || null;
        if (hit) {
          beginSelectionInteraction(event, hit, screenPoint, worldPoint);
        } else {
          if (!isAdditiveSelection(event)) setSelection([]);
          state.interaction = { kind: "pan", startScreen: screenPoint, startOffsetX: state.view.offsetX, startOffsetY: state.view.offsetY };
          canvas.setPointerCapture?.(event.pointerId);
          renderAll();
        }
        return;
      }

      const prefs = activePrefs();
      if (state.activeTool === TOOL.BRUSH) {
        const points = [worldPoint];
        state.interaction = { kind: "brush", points };
        state.draft = { type: "brush", points, size: prefs.size, shape: "circle", color: prefs.color, alpha: prefs.alpha, startHead: !!prefs.startHead, endHead: !!prefs.endHead };
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }
      if (state.activeTool === TOOL.ERASER) {
        const points = [worldPoint];
        state.interaction = { kind: "eraser", points };
        state.draft = { type: "eraser", points, size: prefs.size, shape: prefs.shape, alpha: 100 };
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }
      if (state.activeTool === TOOL.SHAPE) {
        state.interaction = { kind: "shape", start: worldPoint };
        state.draft = buildShapeObject(worldPoint, worldPoint);
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }
      if (state.activeTool === TOOL.CUT) {
        state.interaction = { kind: "cut", start: worldPoint };
        state.draft = buildCutPreview(worldPoint, worldPoint);
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }
      if (state.activeTool === TOOL.LINE || state.activeTool === TOOL.ARROW_ONE || state.activeTool === TOOL.ARROW_TWO) {
        state.interaction = { kind: "dragLine", start: worldPoint, tool: state.activeTool };
        state.draft = {
          type: state.activeTool === TOOL.LINE ? "line" : "arrow",
          start: worldPoint,
          end: worldPoint,
          color: prefs.color,
          size: prefs.size,
          alpha: prefs.alpha,
          startHead: !!prefs.startHead,
          endHead: !!prefs.endHead,
        };
        canvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
        return;
      }

      state.interaction = { kind: "pan", startScreen: screenPoint, startOffsetX: state.view.offsetX, startOffsetY: state.view.offsetY };
      canvas.setPointerCapture?.(event.pointerId);
    }

    function onPointerMove(event) {
      if (!state.interaction) return;
      if (state.touchMap.has(event.pointerId)) state.touchMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (state.interaction.kind === "pinchPan" && state.pinchState && state.touchMap.size >= 2) {
        const currentDistance = getTwoTouchDistance(state.touchMap);
        const values = Array.from(state.touchMap.values());
        const centerClient = midpoint(values[0], values[1]);
        const rect = canvas.getBoundingClientRect();
        const screenCenter = { x: centerClient.x - rect.left, y: centerClient.y - rect.top };
        const newScale = clamp(state.pinchState.startScale * (currentDistance / Math.max(1, state.pinchState.startDistance)), 0.25, 6);
        const worldAtCenter = {
          x: (screenCenter.x - state.pinchState.startOffsetX) / state.pinchState.startScale,
          y: (screenCenter.y - state.pinchState.startOffsetY) / state.pinchState.startScale,
        };
        state.view = {
          scale: newScale,
          offsetX: screenCenter.x - worldAtCenter.x * newScale,
          offsetY: screenCenter.y - worldAtCenter.y * newScale,
        };
        renderAll();
        return;
      }

      const screenPoint = canvasPointFromEvent(event, canvas);
      const worldPoint = screenToWorld(screenPoint);

      if (state.interaction.kind === "pan") {
        state.view = {
          ...state.view,
          offsetX: state.interaction.startOffsetX + (screenPoint.x - state.interaction.startScreen.x),
          offsetY: state.interaction.startOffsetY + (screenPoint.y - state.interaction.startScreen.y),
        };
        renderAll();
        return;
      }

      if (state.interaction.kind === "selectHold") {
        const moveDist = distance(screenPoint, state.interaction.startScreen);
        if (moveDist > 5) {
          clearLongPressTimer(state.interaction);
          if (state.interaction.canMove && state.selectedIds.length) {
            state.interaction.kind = "selectMove";
          } else {
            return;
          }
        } else {
          return;
        }
      }

      if (state.interaction.kind === "selectMove") {
        const dx = worldPoint.x - state.interaction.startWorld.x;
        const dy = worldPoint.y - state.interaction.startWorld.y;
        const nextScene = clone(state.interaction.baseScene);
        const selectedSet = new Set(state.interaction.moveIds || state.selectedIds);
        nextScene.objects = nextScene.objects.map((object) => selectedSet.has(object.id) ? translateObject(object, dx, dy) : object);
        state.scene = nextScene;
        renderAll();
        return;
      }

      const prefs = activePrefs();
      if (state.interaction.kind === "brush") {
        state.interaction.points = [...state.interaction.points, worldPoint];
        state.draft = { type: "brush", points: state.interaction.points, size: prefs.size, shape: "circle", color: prefs.color, alpha: prefs.alpha, startHead: !!prefs.startHead, endHead: !!prefs.endHead };
        renderCanvas();
        return;
      }
      if (state.interaction.kind === "eraser") {
        state.interaction.points = [...state.interaction.points, worldPoint];
        state.draft = { type: "eraser", points: state.interaction.points, size: prefs.size, shape: prefs.shape, alpha: 100 };
        renderCanvas();
        return;
      }
      if (state.interaction.kind === "shape") {
        state.draft = buildShapeObject(state.interaction.start, worldPoint);
        renderCanvas();
        return;
      }
      if (state.interaction.kind === "cut") {
        state.draft = buildCutPreview(state.interaction.start, worldPoint);
        renderCanvas();
        return;
      }
      if (state.interaction.kind === "dragLine") {
        state.draft = {
          type: state.interaction.tool === TOOL.LINE ? "line" : "arrow",
          start: state.interaction.start,
          end: worldPoint,
          color: prefs.color,
          size: prefs.size,
          alpha: prefs.alpha,
          startHead: !!prefs.startHead,
          endHead: !!prefs.endHead,
        };
        renderCanvas();
      }
    }

    function onPointerUp(event) {
      state.touchMap.delete(event.pointerId);
      if (state.touchMap.size < 2) state.pinchState = null;
      if (!state.interaction || state.interaction.kind === "pinchPan") { state.interaction = null; return; }

      const screenPoint = canvasPointFromEvent(event, canvas);
      const worldPoint = screenToWorld(screenPoint);
      const prefs = activePrefs();

      if (state.interaction.kind === "pan") {
        state.interaction = null;
        canvas.releasePointerCapture?.(event.pointerId);
        return;
      }

      if (state.interaction.kind === "selectHold") {
        clearLongPressTimer(state.interaction);
        state.interaction = null;
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
        return;
      }

      if (state.interaction.kind === "selectMove") {
        pushHistory(clone(state.scene), { label: "Move selection", groupKey: "move-selection" });
        state.interaction = null;
        canvas.releasePointerCapture?.(event.pointerId);
        return;
      }

      if (state.interaction.kind === "brush") {
        const nextScene = clone(state.scene);
        const newBrush = {
          id: makeId("brush"),
          type: "brush",
          points: state.interaction.points.length ? state.interaction.points : [worldPoint],
          size: prefs.size,
          shape: "circle",
          color: prefs.color,
          alpha: prefs.alpha,
          startHead: !!prefs.startHead,
          endHead: !!prefs.endHead,
        };
        nextScene.objects.push(newBrush);
        pushHistory(nextScene, { label: "Draw brush" });
        state.interaction = null;
        state.draft = null;
        setSelection([newBrush.id]);
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
        return;
      }

      if (state.interaction.kind === "eraser") {
        const nextScene = clone(state.scene);
        const newEraser = {
          id: makeId("eraser"),
          type: "eraser",
          points: state.interaction.points.length ? state.interaction.points : [worldPoint],
          size: prefs.size,
          shape: prefs.shape,
          alpha: 100,
        };
        nextScene.objects.push(newEraser);
        pushHistory(nextScene, { label: "Erase" });
        state.interaction = null;
        state.draft = null;
        setSelection([newEraser.id]);
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
        return;
      }

      if (state.interaction.kind === "shape") {
        const nextScene = clone(state.scene);
        const newShape = buildShapeObject(state.interaction.start, worldPoint);
        nextScene.objects.push(newShape);
        pushHistory(nextScene, { label: "Draw shape" });
        state.interaction = null;
        state.draft = null;
        setSelection([newShape.id]);
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
        return;
      }

      if (state.interaction.kind === "cut") {
        performCutRect(state.interaction.start, worldPoint);
        state.interaction = null;
        state.draft = null;
        canvas.releasePointerCapture?.(event.pointerId);
        return;
      }

      if (state.interaction.kind === "dragLine") {
        const nextScene = clone(state.scene);
        const object = {
          id: makeId(state.interaction.tool === TOOL.LINE ? "line" : "arrow"),
          type: state.interaction.tool === TOOL.LINE ? "line" : "arrow",
          start: state.interaction.start,
          end: worldPoint,
          color: prefs.color,
          size: prefs.size,
          alpha: prefs.alpha,
          startHead: !!prefs.startHead,
          endHead: !!prefs.endHead,
        };
        nextScene.objects.push(object);
        pushHistory(nextScene, { label: state.interaction.tool === TOOL.LINE ? "Draw line" : "Draw arrow" });
        state.interaction = null;
        state.draft = null;
        setSelection([object.id]);
        canvas.releasePointerCapture?.(event.pointerId);
        renderAll();
      }
    }

    function setLineArrowSetting(key, checked) {
      applyAttributesPatch({ [key]: checked }, { label: "Toggle line arrowhead", groupKey: "line-arrowhead" });
    }

    textEditor.addEventListener("input", () => {
      if (state.editingText) {
        syncEditingTextFromEditorDom();
        updateTextEditorBoxMetricsFromDom();
        state.editingText = ensureTextBoxFitsContent(state.editingText);
        renderTextEditor();
      }
    });
    textEditor.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        insertPlainTextIntoEditor("\n");
      }
    });
    textEditor.addEventListener("paste", (event) => {
      const text = event.clipboardData?.getData("text/plain");
      if (typeof text !== "string") return;
      event.preventDefault();
      event.stopPropagation();
      insertPlainTextIntoEditor(text);
    });
    textEditor.addEventListener("mouseup", () => {
      if (state.editingText) {
        updateTextEditorBoxMetricsFromDom();
        state.editingText = ensureTextBoxFitsContent(state.editingText);
        renderTextEditor();
      }
    });
    textEditor.addEventListener("blur", () => {
      if (state.activeTool === TOOL.TEXT) {
        setTimeout(() => {
          if (state.activeTool === TOOL.TEXT && state.editingText) textEditor.focus();
        }, 0);
      } else if (state.editingText) {
        commitEditingText();
      }
    });

    $("undoBtn").addEventListener("click", () => {
      if (state.historyIndex === 0) return;
      state.historyIndex -= 1;
      state.scene = clone(state.history[state.historyIndex]);
      state.draft = null;
      state.interaction = null;
      state.editingText = null;
      setSelection([]);
      renderAll();
    });
    $("redoBtn").addEventListener("click", () => {
      if (state.historyIndex >= state.history.length - 1) return;
      state.historyIndex += 1;
      state.scene = clone(state.history[state.historyIndex]);
      state.draft = null;
      state.interaction = null;
      state.editingText = null;
      setSelection([]);
      renderAll();
    });
    $("elementsBtn").addEventListener("click", () => {
      state.panels.open = state.panels.open === "elements" ? null : "elements";
      renderAll();
    });
    $("logBtn").addEventListener("click", () => {
      state.panels.open = state.panels.open === "log" ? null : "log";
      renderAll();
    });
    $("closePanelBtn").addEventListener("click", () => {
      state.panels.open = null;
      renderAll();
    });

    $("uploadBtn").addEventListener("click", () => fileInput.click());
    $("pasteBtn").addEventListener("click", () => { pasteLatestClipboard(); });
    $("saveBtn").addEventListener("click", saveCanvas);
    $("copyBtn").addEventListener("click", copyCanvas);
    $("clearBtn").addEventListener("click", () => confirmOverlay.classList.add("show"));
    $("cancelClearBtn").addEventListener("click", () => confirmOverlay.classList.remove("show"));
    $("confirmClearBtn").addEventListener("click", clearCanvasNow);
    fileInput.addEventListener("change", handleImageUpload);

    $("lineStartHeadToolInput").addEventListener("change", (event) => setLineArrowSetting("startHead", event.target.checked));
    $("lineEndHeadToolInput").addEventListener("change", (event) => setLineArrowSetting("endHead", event.target.checked));

    function bindStepper(inputId, upId, downId, min, max, apply) {
      const input = $(inputId), up = $(upId), down = $(downId);
      input.addEventListener("change", () => apply(clamp(Number(input.value) || 0, min, max)));
      up.addEventListener("click", () => apply(clamp((Number(input.value) || 0) + 1, min, max)));
      down.addEventListener("click", () => apply(clamp((Number(input.value) || 0) - 1, min, max)));
    }

    function bindSingleStepper(inputId, upId, min, max, apply) {
      const input = $(inputId), up = $(upId);
      input.addEventListener("change", () => apply(clamp(Number(input.value) || 0, min, max)));
      up.addEventListener("click", () => apply(clamp((Number(input.value) || 0) + 1, min, max)));
    }

    bindStepper("sizeInput", "sizeUp", "sizeDown", 1, 300, (value) => {
      const sel = selectedObject();
      if (sel && sel.type === "image") resizeSelectedImage(value);
      else applyAttributesPatch({ size: value }, { label: "Change size", groupKey: "attr-size" });
    });
    bindStepper("strokeInput", "strokeUp", "strokeDown", 0, 60, (value) => applyAttributesPatch({ stroke: value }, { label: "Change stroke width", groupKey: "attr-stroke" }));
    bindStepper("bgR", "bgRUp", "bgRDown", 0, 255, (value) => applyAttributesPatch({ color: rgbToHex(value, Number($("bgG").value), Number($("bgB").value)) }, { label: "Change background colour", groupKey: "background-colour" }));
    bindStepper("bgG", "bgGUp", "bgGDown", 0, 255, (value) => applyAttributesPatch({ color: rgbToHex(Number($("bgR").value), value, Number($("bgB").value)) }, { label: "Change background colour", groupKey: "background-colour" }));
    bindStepper("bgB", "bgBUp", "bgBDown", 0, 255, (value) => applyAttributesPatch({ color: rgbToHex(Number($("bgR").value), Number($("bgG").value), value) }, { label: "Change background colour", groupKey: "background-colour" }));

    $("alphaInput").addEventListener("input", (event) => applyAttributesPatch({ alpha: Number(event.target.value) }, { label: "Change alpha", groupKey: "attr-alpha" }));
    $("fillTargetInput").addEventListener("change", (event) => {
      state.shapeColourTargets.fill = event.target.checked;
      applySharedColourToCurrentContext();
      renderAll();
    });
    $("strokeTargetInput").addEventListener("change", (event) => {
      state.shapeColourTargets.stroke = event.target.checked;
      applySharedColourToCurrentContext();
      renderAll();
    });

    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointerleave", onPointerUp);
    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const point = { x: event.clientX - rect.left, y: event.clientY - rect.top };
      const factor = event.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomAt(point, state.view.scale * factor);
    }, { passive: false });

    function isTextEntryTarget(target) {
      return !!target && (
        target === textEditor ||
        target.tagName === "INPUT" ||
        target.tagName === "TEXTAREA" ||
        target.isContentEditable
      );
    }

    window.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
        event.preventDefault();
        if (event.shiftKey) $("redoBtn").click(); else $("undoBtn").click();
        return;
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") {
        event.preventDefault();
        $("redoBtn").click();
        return;
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c" && !state.editingText && state.selectedIds.length) {
        event.preventDefault();
        copySelectedElements();
        return;
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "v" && !state.editingText && state.lastClipboardSource === "elements" && state.elementClipboard?.length) {
        event.preventDefault();
        pasteClipboardElements();
        return;
      }
      if (event.key === "Delete" && !state.editingText && state.selectedIds.length && !isTextEntryTarget(event.target)) {
        event.preventDefault();
        deleteSelectedElements();
        return;
      }
      if (event.key === "Escape") {
        if (state.activeTool === TOOL.TEXT && state.editingText) commitEditingText();
        else {
          state.editingText = null;
          state.draft = null;
          state.interaction = null;
          renderAll();
        }
      }
    });

    window.addEventListener("paste", (event) => {
      if (isTextEntryTarget(event.target) || state.editingText) return;
      const items = event.clipboardData?.items || [];
      const imageItem = [...items].find((item) => item.type.startsWith("image/"));
      if (imageItem) {
        event.preventDefault();
        const file = imageItem.getAsFile();
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          state.lastClipboardSource = "image";
          addImage(reader.result);
        };
        reader.readAsDataURL(file);
        return;
      }
      if (state.lastClipboardSource === "elements" && state.elementClipboard?.length) {
        event.preventDefault();
        pasteClipboardElements();
      }
    });

    initHistory();
    updateCanvasSize();
    window.addEventListener("resize", updateCanvasSize);
    renderAll();
  </script>
</body>
</html>
